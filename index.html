<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDR Voice Assist | Manual Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .listening {
            animation: pulse-ring 1.5s infinite;
            background-color: #ef4444; 
            color: white;
            border-color: #ef4444;
        }
        body::-webkit-scrollbar { display: none; }
        .source-badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #4ade80;
        }
        .hidden-element { display: none !important; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen flex flex-col justify-between p-4 md:p-8 select-none overflow-hidden">

    <header class="flex justify-between items-center border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-3xl font-black tracking-widest text-red-600 uppercase">KDR System</h1>
            <p class="text-xs text-gray-500 font-mono mt-1">TRYB: MANUALNE POTWIERDZENIE (SAFETY)</p>
        </div>
        <div id="status-indicator" class="text-sm font-bold bg-gray-900 px-4 py-2 border border-gray-700 rounded uppercase text-gray-400">
            Inicjalizacja...
        </div>
    </header>

    <main class="flex-grow flex flex-col justify-center items-center py-6 w-full max-w-5xl mx-auto">
        <p id="user-input-display" class="text-xl md:text-2xl text-gray-500 mb-4 text-center italic min-h-[40px] font-mono">
            Ładowanie...
        </p>
        
        <div id="source-indicator" class="hidden-element text-sm md:text-base font-bold px-4 py-2 rounded mb-6 source-badge uppercase tracking-wider"></div>

        <div id="procedure-output" class="text-2xl md:text-5xl font-black leading-tight text-center text-white break-words w-full"></div>
    </main>

    <footer class="flex justify-center pb-4">
        <button id="mic-btn" disabled class="w-48 h-48 md:w-56 md:h-56 rounded-full border-4 border-gray-600 text-gray-300 font-bold text-2xl uppercase transition-all duration-200 active:scale-95 flex flex-col justify-center items-center gap-2 bg-gray-900 shadow-2xl opacity-50 cursor-not-allowed">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
            <span>Rozkaz</span>
        </button>

        <button id="reset-btn" class="hidden-element w-48 h-48 md:w-56 md:h-56 rounded-full border-4 border-yellow-500 text-yellow-500 font-bold text-2xl uppercase transition-all duration-200 active:scale-95 flex flex-col justify-center items-center gap-2 bg-gray-900 shadow-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            <span>Gotowy</span>
        </button>
    </footer>

    <script>
        let knowledgeBaseDocuments = [];
        const filesToLoad = [
            'procedury/wypadek-ev.json',
            'procedury/pozar-ev.json',
            'procedury/zatopienie-ev.json',
            'procedury/dezaktywacja-ev.json',
            'procedury/wypadek-masowy.json'
        ];

        const micBtn = document.getElementById('mic-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusIndicator = document.getElementById('status-indicator');
        const userInputDisplay = document.getElementById('user-input-display');
        const procedureOutput = document.getElementById('procedure-output');
        const sourceIndicator = document.getElementById('source-indicator');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        async function loadProcedures() {
            statusIndicator.innerText = 'Pobieranie...';
            for (const file of filesToLoad) {
                try {
                    const response = await fetch(`${file}?v=${new Date().getTime()}`);
                    const data = await response.json();
                    knowledgeBaseDocuments.push(data);
                } catch (e) { console.error("Błąd pliku:", file); }
            }
            statusIndicator.innerText = 'Gotowy';
            userInputDisplay.innerText = 'Oczekuję na komendę...';
            micBtn.disabled = false;
            micBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        window.addEventListener('load', () => {
            loadProcedures().then(() => {
                if (!SpeechRecognition) return;
                const recognition = new SpeechRecognition();
                recognition.lang = 'pl-PL';

                recognition.onstart = () => {
                    micBtn.classList.add('listening');
                    statusIndicator.innerText = 'Słucham...';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript.toLowerCase().trim();
                    userInputDisplay.innerText = `> ${transcript.toUpperCase()}`;
                    executeStrictSearch(transcript);
                };

                recognition.onend = () => {
                    micBtn.classList.remove('listening');
                };

                function executeStrictSearch(query) {
                    let found = knowledgeBaseDocuments.find(doc => doc.keywords.some(k => query.includes(k)));
                    if (found) {
                        displayProcedure(found);
                    } else {
                        procedureOutput.innerHTML = '<span class="text-red-500 uppercase">Odmowa. Brak danych.</span>';
                        speak("Odmowa. Brak danych.");
                        toggleButtons(false); // Pokaż przycisk powrotu nawet przy błędzie
                    }
                }

                function displayProcedure(doc) {
                    sourceIndicator.innerText = `WERYFIKACJA: ${doc.id}`;
                    sourceIndicator.classList.remove('hidden-element');
                    const formatted = doc.content.replace(/(\d+\.)/g, '<span class="text-yellow-500">$1</span>').replace(/\n/g, '<br>');
                    procedureOutput.innerHTML = `<span class="text-gray-400 text-xl block mb-2">${doc.prefix}</span>${formatted}`;
                    speak(`${doc.prefix} ${doc.content}`);
                    toggleButtons(false); // Ukryj mikrofon, pokaż przycisk Gotowy
                }

                function toggleButtons(showMic) {
                    if (showMic) {
                        micBtn.classList.remove('hidden-element');
                        resetBtn.classList.add('hidden-element');
                        statusIndicator.innerText = 'Gotowy';
                    } else {
                        micBtn.classList.add('hidden-element');
                        resetBtn.classList.remove('hidden-element');
                        statusIndicator.innerText = 'Procedura aktywna';
                    }
                }

                function speak(text) {
                    if (synth.speaking) synth.cancel();
                    const utt = new SpeechSynthesisUtterance(text);
                    utt.lang = 'pl-PL';
                    synth.speak(utt);
                }

                // Obsługa przycisku mikrofonu
                micBtn.addEventListener('click', () => {
                    const unlock = new SpeechSynthesisUtterance('');
                    synth.speak(unlock);
                    recognition.start();
                });

                // Obsługa przycisku powrotu
                resetBtn.addEventListener('click', () => {
                    if (synth.speaking) synth.cancel();
                    procedureOutput.innerHTML = '';
                    sourceIndicator.classList.add('hidden-element');
                    userInputDisplay.innerText = 'Oczekuję na następny rozkaz...';
                    toggleButtons(true);
                });
            });
        });
    </script>
</body>
</html>
