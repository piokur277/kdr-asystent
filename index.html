<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR AI | System Procedur</title>
    <style>
        :root {
            --bg: #020617;
            --bg2: #08101e;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #f8fafc;
            --muted: #94a3b8;
            --line: #1e293b;
            --warn: #eab308;
            --ok: #10b981;
            --ok-soft: rgba(16, 185, 129, 0.14);
            --accent: #ef4444;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.16), transparent 34%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg) 45%, var(--bg2) 100%);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body { padding: 8px; }

        .app-shell {
            max-width: 920px;
            margin: 0 auto;
            min-height: calc(100vh - 16px);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header {
            border-bottom: 1px solid var(--line);
            padding-bottom: 6px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            font-style: italic;
            color: var(--accent);
        }

        .version {
            font-size: 0.54rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.08em;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .toolbar-btn,
        .search-btn {
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar-btn.api-on {
            border-color: var(--ok);
            color: #6ee7b7;
            background: var(--ok-soft);
        }

        .toolbar-btn.api-clear {
            color: #fca5a5;
            border-color: #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
        }

        .api-panel {
            display: grid;
            grid-template-columns: 1.4fr 1fr auto auto;
            gap: 8px;
            margin-top: 8px;
        }

        .api-input,
        .manual-input {
            width: 100%;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            outline: none;
        }

        .api-input::placeholder,
        .manual-input::placeholder {
            color: #64748b;
        }

        #debug-console {
            margin-top: 8px;
            height: 50px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 6px 8px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 10px;
            line-height: 1.35;
            background: rgba(0, 0, 0, 0.36);
            border-left: 3px solid var(--accent);
            color: #facc15;
        }

        .debug-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .debug-line.error { color: #f87171; }

        .main {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 auto;
            min-height: 0;
        }

        .manual-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .status-line {
            min-height: 14px;
            text-align: center;
            color: var(--muted);
            font-size: 10px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .output-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 6px 2px 18px;
            border-top: 1px solid rgba(30, 41, 59, 0.6);
        }

        #procedure-output {
            text-align: center;
            font-weight: 900;
            line-height: 1.15;
            font-size: clamp(1.4rem, 4.5vw, 3rem);
        }

        .empty-state {
            margin-top: 48px;
            color: #475569;
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .source-badge {
            display: inline-block;
            margin-bottom: 10px;
