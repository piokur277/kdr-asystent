<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR AI | Gemini 3 Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .listening { animation: pulse 1s infinite; background-color: #ef4444 !important; }
        body { background-color: #020617; color: #f8fafc; font-family: system-ui, sans-serif; }
        .hidden-element { display: none !important; }
        .source-badge { display: inline-block; background: #064e3b; border: 1px solid #10b981; color: #34d399; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="border-b border-slate-800 pb-4 mb-4 flex justify-between items-start">
        <div>
            <h1 class="text-2xl font-black text-red-600 uppercase italic leading-none">KDR System AI</h1>
            <div id="debug-console" class="mt-2 text-[9px] font-mono bg-black p-2 border border-slate-700 text-yellow-500 h-24 w-64 overflow-y-auto">
                > System V7 (Gemini 3) gotowy...
            </div>
        </div>
        <span class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold uppercase">Gemini 3 Flash</span>
    </header>

    <main class="flex-grow flex flex-col items-center w-full max-w-4xl mx-auto text-center">
        <p id="user-input-display" class="text-slate-500 mb-6 italic font-mono">Oczekiwanie na bazę...</p>
        <div id="procedure-output" class="text-2xl md:text-4xl font-bold leading-tight w-full"></div>
    </main>

    <footer class="fixed bottom-10 left-0 right-0 flex justify-center">
        <button id="mic-btn" disabled class="w-44 h-44 rounded-full border-4 border-slate-700 bg-slate-900 text-slate-400 font-bold uppercase transition-all shadow-2xl">
            Rozkaz
        </button>
        <button id="reset-btn" class="hidden-element w-44 h-44 rounded-full border-4 border-yellow-500 bg-slate-900 text-yellow-500 font-bold uppercase shadow-[0_0_30px_rgba(234,179,8,0.3)]">
            Gotowy
        </button>
    </footer>

    <script>
        let API_KEY = "";
        let knowledgeBase = [];
        const files = ['procedury/wypadek-ev.json', 'procedury/pozar-ev.json', 'procedury/zatopienie-ev.json', 'procedury/dezaktywacja-ev.json', 'procedury/wypadek-masowy.json'];

        const log = (msg, err = false) => {
            const el = document.getElementById('debug-console');
            el.innerHTML += `<div class="${err ? 'text-red-500' : ''}">> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        async function init() {
            log("Wczytywanie procedur...");
            for (const f of files) {
                try {
                    const r = await fetch(`${f}?v=${Date.now()}`);
                    if (r.ok) knowledgeBase.push(await r.json());
                } catch (e) { log(`Błąd: ${f}`, true); }
            }
            if (knowledgeBase.length > 0) {
                API_KEY = prompt("Wklej NOWY API Key (z Gemini 3):")?.trim();
                document.getElementById('mic-btn').disabled = false;
                document.getElementById('mic-btn').classList.replace('text-slate-400', 'text-white');
                document.getElementById('user-input-display').innerText = "Gotowy do pracy.";
            }
        }

        async function handleCommand(query) {
            log(`Analiza: ${query}`);
            
            if (API_KEY) {
                log("Łączenie z Gemini 3 Flash...");
                try {
                    const ctx = knowledgeBase.map(d => `ID: ${d.id}, Opis: ${d.prefix}`).join("\n");
                    // UŻYWAMY MODELU GEMINI-3-FLASH
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${API_KEY}`;
                    
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Jesteś asystentem KDR. Na podstawie rozkazu: "${query}", wybierz JEDNO ID z listy:\n${ctx}\nPodaj TYLKO samo ID.` }] }]
                        })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        const aiId = data.candidates[0].content.parts[0].text.trim();
                        log(`AI wybrało: ${aiId}`);
                        const found = knowledgeBase.find(doc => aiId.includes(doc.id));
                        if (found) { display(found, "WERYFIKACJA AI"); return; }
                    } else {
                        log(`Błąd API: ${data.error?.message.substring(0,25)}...`, true);
                    }
                } catch (e) { log("AI zawiodło, tryb lokalny."); }
            }

            // LOKALNY FALLBACK (Jeśli AI nie odpowie)
            let best = null; let max = 0;
            const words = query.toLowerCase().split(/\s+/);
            knowledgeBase.forEach(doc => {
                let s = 0;
                doc.keywords.forEach(k => {
                    const kl = k.toLowerCase();
                    if (query.includes(kl)) s += 50;
                    words.forEach(w => { if (w.length > 3 && kl.includes(w)) s += 10; });
                });
                if (s > max) { max = s; best = doc; }
            });

            if (best && max > 5) display(best, "WERYFIKACJA LOKALNA");
            else {
                document.getElementById('procedure-output').innerHTML = '<span class="text-red-500 font-black">NIE ZROZUMIAŁEM ROZKAZU</span>';
                speak("Odmowa. Brak procedury.");
                toggle(false);
            }
        }

        function display(doc, type) {
            document.getElementById('procedure-output').innerHTML = `
                <div class="mb-4"><span class="source-badge">${type}</span></div>
                <div class="text-slate-500 text-sm italic mb-4 leading-tight">${doc.prefix}</div>
                <div class="text-left max-w-2xl mx-auto border-t border-slate-800 pt-6">
                    ${doc.content.replace(/(\d+\.)/g, '<br><span class="text-yellow-500 font-black">$1</span>').replace(/\n/g, '<br>')}
                </div>
            `;
            speak(`${doc.prefix} ${doc.content}`);
            toggle(false);
        }

        function toggle(s) {
            document.getElementById('mic-btn').classList.toggle('hidden-element', !s);
            document.getElementById('reset-btn').classList.toggle('hidden-element', s);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pl-PL'; u.rate = 1.1;
            window.speechSynthesis.speak(u);
        }

        window.addEventListener('load', () => {
            init();
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.lang = 'pl-PL';
            rec.onstart = () => document.getElementById('mic-btn').classList.add('listening');
            rec.onend = () => document.getElementById('mic-btn').classList.remove('listening');
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('user-input-display').innerText = `ROZKAZ: ${t.toUpperCase()}`;
                handleCommand(t);
            };
            document.getElementById('mic-btn').onclick = () => { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); rec.start(); };
            document.getElementById('reset-btn').onclick = () => { 
                window.speechSynthesis.cancel(); 
                document.getElementById('procedure-output').innerHTML = ''; 
                toggle(true); 
            };
        });
    </script>
</body>
</html>
