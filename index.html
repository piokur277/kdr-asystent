<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="page-test.png">
    <title>KDR AI | System Procedur</title>
    <style>
        :root {
            --bg: #020617;
            --bg2: #08101e;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #f8fafc;
            --muted: #94a3b8;
            --line: #1e293b;
            --warn: #eab308;
            --ok: #10b981;
            --ok-soft: rgba(16, 185, 129, 0.14);
            --accent: #ef4444;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.16), transparent 34%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg) 45%, var(--bg2) 100%);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body { padding: 8px; }

        .app-shell {
            max-width: 920px;
            margin: 0 auto;
            min-height: calc(100vh - 16px);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header {
            border-bottom: 1px solid var(--line);
            padding-bottom: 6px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            font-style: italic;
            color: var(--accent);
        }

        .version {
            font-size: 0.54rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.08em;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .toolbar-btn,
        .search-btn {
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar-btn.api-on {
            border-color: var(--ok);
            color: #6ee7b7;
            background: var(--ok-soft);
        }

        .toolbar-btn.api-clear {
            color: #fca5a5;
            border-color: #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
        }

        .toolbar-btn.install-ready {
            border-color: var(--ok);
            color: #6ee7b7;
            background: var(--ok-soft);
        }

        .api-panel {
            display: grid;
            grid-template-columns: 1.4fr 1fr auto auto;
            gap: 8px;
            margin-top: 8px;
        }

        .api-input,
        .manual-input {
            width: 100%;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            outline: none;
        }

        .api-input::placeholder,
        .manual-input::placeholder {
            color: #64748b;
        }

        #debug-console {
            margin-top: 8px;
            height: 50px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 6px 8px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 10px;
            line-height: 1.35;
            background: rgba(0, 0, 0, 0.36);
            border-left: 3px solid var(--accent);
            color: #facc15;
        }

        .debug-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .debug-line.error { color: #f87171; }

        .main {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 auto;
            min-height: 0;
        }

        .manual-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .status-line {
            min-height: 14px;
            text-align: center;
            color: var(--muted);
            font-size: 10px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .output-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 6px 2px 18px;
            border-top: 1px solid rgba(30, 41, 59, 0.6);
        }

        #procedure-output {
            text-align: center;
            font-weight: 900;
            line-height: 1.15;
            font-size: clamp(1.4rem, 4.5vw, 3rem);
        }

        .empty-state {
            margin-top: 48px;
            color: #475569;
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .source-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid var(--ok);
            background: var(--ok-soft);
            color: #6ee7b7;
        }

        .procedure-prefix {
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 12px;
            font-style: italic;
            font-weight: 600;
        }

        .procedure-card {
            text-align: left;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.42), rgba(15, 23, 42, 0.18));
            border-radius: 16px;
            padding: 18px;
        }

        .procedure-line {
            display: block;
            margin-bottom: 10px;
            font-size: clamp(0.98rem, 2vw, 1.2rem);
            line-height: 1.45;
            font-weight: 700;
        }

        .step-no { color: var(--warn); }

        .procedure-list {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .proc-row {
            display: grid;
            grid-template-columns: 28px 1fr auto auto;
            gap: 8px;
            align-items: start;
            padding: 6px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.45);
        }

        .proc-row:last-child { border-bottom: none; }

        .proc-no {
            color: var(--muted);
            font-size: 11px;
            text-align: left;
        }

        .proc-name {
            color: #e2e8f0;
            text-align: left;
            font-size: 12px;
            line-height: 1.35;
            font-weight: 600;
        }

        .proc-open {
            border: 0;
            background: transparent;
            color: #e2e8f0;
            text-align: left;
            font-size: 12px;
            line-height: 1.35;
            font-weight: 700;
            padding: 0;
            cursor: pointer;
        }

        .proc-open:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .proc-key {
            color: #6ee7b7;
            border: 1px solid var(--ok);
            background: var(--ok-soft);
            border-radius: 999px;
            padding: 2px 8px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.03em;
            white-space: nowrap;
            text-transform: lowercase;
        }

        .proc-copy {
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.9);
            color: #e2e8f0;
            border-radius: 8px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .footer {
            position: static;
            display: flex;
            justify-content: center;
            margin-top: 8px;
            padding: 6px 0 4px;
        }

        .footer-inner {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mic-btn,
        .reset-btn {
            width: min(28vw, 112px);
            height: min(28vw, 112px);
            border-radius: 999px;
            border: 4px solid #334155;
            background: rgba(2, 6, 23, 0.92);
            color: #e2e8f0;
            font-size: 0.86rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .reset-btn {
            display: none;
            color: #facc15;
            border-color: #eab308;
        }

        .mic-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .hidden { display: none !important; }

        body.app-locked .app-shell {
            pointer-events: none;
            user-select: none;
            filter: blur(2px);
        }

        .access-gate {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(2, 6, 23, 0.82);
            backdrop-filter: blur(4px);
        }

        .access-card {
            width: min(440px, 100%);
            border: 1px solid #334155;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.97);
            padding: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            display: grid;
            gap: 10px;
        }

        .access-title {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 800;
            color: #e2e8f0;
        }

        .access-subtitle {
            margin: 0;
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.45;
        }

        .access-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .access-input {
            width: 100%;
            border: 1px solid #334155;
            border-radius: 10px;
            background: rgba(2, 6, 23, 0.9);
            color: #e2e8f0;
            padding: 10px 11px;
            font-size: 0.92rem;
            outline: none;
        }

        .access-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.22);
        }

        .access-btn {
            border: 1px solid #334155;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.95);
            color: #e2e8f0;
            font-size: 0.84rem;
            font-weight: 800;
            padding: 10px 13px;
            cursor: pointer;
        }

        .access-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .access-error {
            min-height: 16px;
            color: #fca5a5;
            font-size: 0.78rem;
        }

        .listening {
            animation: pulse 1s infinite;
            background: rgba(127, 29, 29, 0.92) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.35);
        }

        .helper {
            color: #64748b;
            text-align: center;
            font-size: 11px;
            line-height: 1.45;
        }

        body.result-mode .mic-btn,
        body.result-mode .reset-btn {
            width: auto;
            min-width: 108px;
            height: 42px;
            padding: 0 16px;
            border-width: 2px;
            border-radius: 999px;
            font-size: 0.82rem;
            box-shadow: 0 0 26px rgba(0, 0, 0, 0.18);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.985); }
        }

        @media (max-width: 640px) {
            .manual-panel,
            .api-panel { grid-template-columns: 1fr; }

            .search-btn,
            .toolbar-btn { width: 100%; }

            #debug-console { height: 64px; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="header">
            <div class="header-row">
                <h1 class="title">KDR AI SYSTEM</h1>
                <span class="version">v18.0 REBUILD</span>
            </div>

            <div class="toolbar">
                <button id="api-btn" class="toolbar-btn" type="button">Pokaz API</button>
                <button id="voice-help-btn" class="toolbar-btn" type="button">Lista procedur - instrukcja</button>
                <button id="install-btn" class="toolbar-btn hidden" type="button">Instalacja</button>
                <button id="feedback-btn" class="toolbar-btn" type="button">Zglos problem/pomysl</button>
            </div>

            <div id="api-panel" class="api-panel hidden">
                <input id="api-key-input" class="api-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Wklej API Key Gemini">
                <input id="api-model-input" class="api-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Model API, np. gemini-3-flash-preview">
                <button id="api-save-btn" class="toolbar-btn api-on" type="button">Zapisz API</button>
                <button id="api-clear-btn" class="toolbar-btn api-clear" type="button">Usun API</button>
            </div>

            <div id="debug-console" aria-live="polite">
                <div class="debug-line">&gt; System startuje.</div>
            </div>
        </header>

        <main class="main">
            <form id="manual-form" class="manual-panel">
                <input id="manual-query" class="manual-input" type="text" autocomplete="off" placeholder="Wpisz komende, np. wyciek lng albo siarkowodor">
                <button class="search-btn" type="submit">Szukaj</button>
            </form>

            <p id="user-input-display" class="status-line"></p>

            <div id="procedure-scroll-area" class="output-wrap">
                <div id="procedure-output">
                    <div class="empty-state">Oczekiwanie na rozkaz</div>
                </div>
            </div>

            <div class="helper">
                Lokalna baza procedur dziala bez API. Na iOS przycisk Rozkaz otwiera pole tekstowe, aby uzyc mikrofonu klawiatury.
            </div>
        </main>

        <footer class="footer">
            <div class="footer-inner">
                <button id="mic-btn" class="mic-btn" disabled type="button">Rozkaz</button>
                <button id="reset-btn" class="reset-btn hidden" type="button">Gotowy</button>
            </div>
        </footer>
    </div>

    <div id="access-gate" class="access-gate hidden" role="dialog" aria-modal="true" aria-labelledby="access-title">
        <div class="access-card">
            <div class="source-badge">Dostep aplikacji</div>
            <h2 id="access-title" class="access-title">Wpisz kod dostepu</h2>
            <p class="access-subtitle">Kod jest wymagany przed uruchomieniem procedur.</p>
            <div class="access-row">
                <input id="access-code-input" class="access-input" type="password" autocomplete="off" placeholder="Kod dostepu">
                <button id="access-submit-btn" class="access-btn" type="button">Odblokuj</button>
            </div>
            <div id="access-error" class="access-error" aria-live="polite"></div>
        </div>
    </div>

    <script>
        const PLIKI = [
            "procedury/acetylen/karta-z1-butle-acetylen.json",
            "procedury/acetylen/karta-z2-butle-acetylen.json",
            "procedury/acetylen/karta-z3-butle-acetylen.json",
            "procedury/acetylen/karta-z4-butle-acetylen.json",
            "procedury/acetylen/przekazanie-miejsca-zdarzenia-butle-acetylen.json",
            "procedury/acetylen/rozpoznanie-buttle-acetylen.json",
            "procedury/chem/karta-z1-lng-pozar-zew.json",
            "procedury/chem/karta-z2-lng-pozar-strum.json",
            "procedury/chem/karta-z3-lng-pozar-rozlewiska.json",
            "procedury/chem/karta-z4-lng-wyciek.json",
            "procedury/chem/karta-z5-lng-zawory.json",
            "procedury/chem/zalacznik-b1-zagrozenie-biologiczne-gr3-gr4.json",
            "procedury/chem/zalacznik-b22-podejrzana-przesylka-cbr.json",
            "procedury/chem/zalacznik-r1-ochrona-radiologiczna.json",
            "procedury/chem/zalacznik-r2-zdarzenia-radiacyjne-zakres-podstawowy.json",
            "procedury/dezaktywacja-ev.json",
            "procedury/organizacja-dzialan/amoniaknh3.json",
            "procedury/organizacja-dzialan/chlorowodor.json",
            "procedury/organizacja-dzialan/co.json",
            "procedury/organizacja-dzialan/detektor-msa.json",
            "procedury/organizacja-dzialan/h2s.json",
            "procedury/organizacja-dzialan/hcn.json",
            "procedury/organizacja-dzialan/metodyka-organizacji-lacznosci-kdr.json",
            "procedury/organizacja-dzialan/zasady-organizowania-dzialan-ratowniczych.json",
            "procedury/pozar-ev.json",
            "procedury/wypadek-ev.json",
            "procedury/wypadek-masowy.json",
            "procedury/zatopienie-ev.json"
        ];

        const FALLBACK_URL = "procedury/baza.json";
        const FEEDBACK_FORM_URL = "https://forms.gle/F3u9P3jn2RtieHA79";
        const ACCESS_ENABLED = true;
        const ACCESS_CODE_HASH = "42c4545bf96e5df338af0984765ddc2e3555872c857ebc4e31f7c2f372114c5f";
        const ACCESS_SESSION_KEY = "kdr_ai_access_ok";
        const SHOW_INFO_LOGS = false;

        const state = {
            apiKey: localStorage.getItem("kdr_ai_api_key") || "",
            apiModel: localStorage.getItem("kdr_ai_api_model") || "gemini-3-flash-preview",
            procedury: [],
            aliasById: {},
            aliasToProcedureId: {},
            listViewShown: false,
            openedFromList: false,
            recognition: null,
            isListening: false,
            isBusy: false,
            hasSpeechResult: false,
            listenWatchdogId: null,
            iosInputSubmitTimer: null,
            deferredInstallPrompt: null,
            isInitialized: false
        };

        const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const IS_STANDALONE = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;

        const debugConsole = document.getElementById("debug-console");
        const micBtn = document.getElementById("mic-btn");
        const resetBtn = document.getElementById("reset-btn");
        const apiBtn = document.getElementById("api-btn");
        const apiPanel = document.getElementById("api-panel");
        const apiKeyInput = document.getElementById("api-key-input");
        const apiModelInput = document.getElementById("api-model-input");
        const apiSaveBtn = document.getElementById("api-save-btn");
        const apiClearBtn = document.getElementById("api-clear-btn");
        const voiceHelpBtn = document.getElementById("voice-help-btn");
        const installBtn = document.getElementById("install-btn");
        const feedbackBtn = document.getElementById("feedback-btn");
        const manualForm = document.getElementById("manual-form");
        const manualQuery = document.getElementById("manual-query");
        const userInputDisplay = document.getElementById("user-input-display");
        const procedureOutput = document.getElementById("procedure-output");
        const procedureScrollArea = document.getElementById("procedure-scroll-area");
        const accessGate = document.getElementById("access-gate");
        const accessCodeInput = document.getElementById("access-code-input");
        const accessSubmitBtn = document.getElementById("access-submit-btn");
        const accessError = document.getElementById("access-error");

        function log(message, isError = false) {
            if (!debugConsole) return;
            if (!SHOW_INFO_LOGS && !isError) return;
            if (!SHOW_INFO_LOGS && isError && debugConsole.classList.contains("hidden")) {
                debugConsole.classList.remove("hidden");
            }
            const line = document.createElement("div");
            line.className = `debug-line${isError ? " error" : ""}`;
            line.textContent = `> ${message}`;
            debugConsole.appendChild(line);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        function setMicEnabled(enabled) {
            micBtn.disabled = !enabled;
        }

        function updateMicPresentation(label = "Rozkaz") {
            micBtn.textContent = label;
        }

        function setResultMode(active) {
            document.body.classList.toggle("result-mode", active);
        }

        function setAccessGateVisible(visible) {
            if (!accessGate) return;
            accessGate.classList.toggle("hidden", !visible);
            document.body.classList.toggle("app-locked", visible);
        }

        function setAccessError(message = "") {
            if (!accessError) return;
            accessError.textContent = message;
        }

        function setAccessBusy(isBusy) {
            if (!accessSubmitBtn) return;
            accessSubmitBtn.disabled = isBusy;
            accessSubmitBtn.textContent = isBusy ? "Sprawdzam..." : "Odblokuj";
        }

        async function hashTextSHA256(value) {
            const bytes = new TextEncoder().encode(value);
            const digest = await crypto.subtle.digest("SHA-256", bytes);
            return Array.from(new Uint8Array(digest))
                .map(byte => byte.toString(16).padStart(2, "0"))
                .join("");
        }

        async function verifyAccessCode(value) {
            const code = (value || "").trim();
            if (!code) return false;
            if (!window.crypto || !window.crypto.subtle) return code === "KDR2026";
            try {
                const hash = await hashTextSHA256(code);
                return hash === ACCESS_CODE_HASH;
            } catch (error) {
                return false;
            }
        }

        async function ensureInitialized() {
            if (state.isInitialized) return;
            state.isInitialized = true;
            await init();
        }

        async function submitAccessCode() {
            if (!ACCESS_ENABLED) {
                await ensureInitialized();
                return;
            }
            const value = (accessCodeInput?.value || "").trim();
            if (!value) {
                setAccessError("Podaj kod dostepu.");
                accessCodeInput?.focus();
                return;
            }

            setAccessBusy(true);
            setAccessError("");
            const ok = await verifyAccessCode(value);
            if (!ok) {
                setAccessBusy(false);
                setAccessError("Niepoprawny kod. Sprobuj ponownie.");
                accessCodeInput?.select();
                return;
            }

            sessionStorage.setItem(ACCESS_SESSION_KEY, "1");
            if (accessCodeInput) accessCodeInput.value = "";
            setAccessGateVisible(false);
            setAccessBusy(false);
            await ensureInitialized();
            manualQuery.focus();
        }

        async function bootstrapApp() {
            if (!ACCESS_ENABLED) {
                setAccessGateVisible(false);
                await ensureInitialized();
                return;
            }

            const unlocked = sessionStorage.getItem(ACCESS_SESSION_KEY) === "1";
            if (unlocked) {
                setAccessGateVisible(false);
                await ensureInitialized();
                return;
            }

            setAccessGateVisible(true);
            setMicEnabled(false);
            setAccessBusy(false);
            setAccessError("");
            if (accessCodeInput) {
                accessCodeInput.value = "";
                accessCodeInput.focus();
            }
        }

        function updateApiButton() {
            const hasKey = Boolean(state.apiKey);
            apiBtn.textContent = hasKey ? "API ON" : "Pokaz API";
            apiBtn.classList.toggle("api-on", hasKey);
            apiKeyInput.value = state.apiKey;
            apiModelInput.value = state.apiModel;
        }

        function normalizeText(value) {
            return (value || "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^\p{L}\p{N}\s-]/gu, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function escapeHtml(value) {
            return (value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function validateProcedure(item) {
            return Boolean(
                item &&
                typeof item.id === "string" &&
                typeof item.prefix === "string" &&
                Array.isArray(item.keywords) &&
                typeof item.content === "string"
            );
        }

        function dedupeProcedures(items) {
            const map = new Map();
            items.filter(validateProcedure).forEach(item => map.set(item.id, item));
            return Array.from(map.values());
        }

        function buildProcedureAliases() {
            const used = new Set();
            const aliasById = {};
            const aliasToProcedureId = {};

            state.procedury.forEach((procedure, index) => {
                const rawSeed =
                    (typeof procedure.slowo_kluczowe === "string" && procedure.slowo_kluczowe.trim()) ? procedure.slowo_kluczowe :
                    (Array.isArray(procedure.keywords) && procedure.keywords.length > 0) ? procedure.keywords[0] :
                    procedure.id;

                let seed = normalizeText(rawSeed).split(" ")[0].replace(/[^a-z0-9]/g, "");
                if (!seed) seed = `p${index + 1}`;
                if (seed.length < 2) seed = `${seed}${index + 1}`;

                let alias = seed;
                let suffix = 2;
                while (used.has(alias)) {
                    alias = `${seed}${suffix}`;
                    suffix += 1;
                }

                used.add(alias);
                aliasById[procedure.id] = alias;
                aliasToProcedureId[alias] = procedure.id;
            });

            state.aliasById = aliasById;
            state.aliasToProcedureId = aliasToProcedureId;
        }

        async function loadFallbackProcedures() {
            try {
                const response = await fetch(`${FALLBACK_URL}?v=${Date.now()}`, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                if (Array.isArray(json)) return json.filter(validateProcedure);
                return [];
            } catch (error) {
                log("Nie udalo sie wczytac procedury/baza.json.", true);
                return [];
            }
        }

        async function loadProcedures() {
            const fallback = await loadFallbackProcedures();
            if (fallback.length > 0) {
                state.procedury = dedupeProcedures(fallback);
                buildProcedureAliases();
                log(`Zaladowano ${state.procedury.length} procedur (baza.json).`);
                return;
            }

            const loaded = [];
            for (const file of PLIKI) {
                try {
                    const response = await fetch(`${file}?v=${Date.now()}`, { cache: "no-store" });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const json = await response.json();
                    if (validateProcedure(json)) loaded.push(json);
                } catch (error) {
                    log(`Plik ${file} niedostepny lub zablokowany.`);
                }
            }

            state.procedury = dedupeProcedures(loaded);
            buildProcedureAliases();
            log(`Zaladowano ${state.procedury.length} procedur.`);
        }

        async function copyToClipboard(text) {
            const value = (text || "").trim();
            if (!value) return false;

            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(value);
                    return true;
                } catch (error) {}
            }

            try {
                const temp = document.createElement("textarea");
                temp.value = value;
                temp.setAttribute("readonly", "");
                temp.style.position = "fixed";
                temp.style.opacity = "0";
                temp.style.left = "-9999px";
                document.body.appendChild(temp);
                temp.focus();
                temp.select();
                const ok = document.execCommand("copy");
                document.body.removeChild(temp);
                return Boolean(ok);
            } catch (error) {
                return false;
            }
        }

        function scoreProcedure(query, procedure) {
            const normalizedQuery = normalizeText(query);
            const tokens = normalizedQuery.split(" ").filter(token => token.length > 2);
            const prefix = normalizeText(procedure.prefix);
            let score = 0;

            if (normalizedQuery === normalizeText(procedure.id)) score += 300;
            if (procedure.slowo_kluczowe && normalizedQuery.includes(normalizeText(procedure.slowo_kluczowe))) score += 180;
            if (prefix.includes(normalizedQuery) && normalizedQuery.length > 4) score += 120;

            procedure.keywords.forEach(keyword => {
                const normalizedKeyword = normalizeText(keyword);
                if (normalizedQuery.includes(normalizedKeyword)) score += 120;
                if (normalizedKeyword.includes(normalizedQuery) && normalizedQuery.length > 4) score += 60;
                tokens.forEach(token => {
                    if (normalizedKeyword.includes(token)) score += token.length > 4 ? 16 : 8;
                    if (prefix.includes(token)) score += token.length > 4 ? 9 : 4;
                });
            });

            return score;
        }

        function findLocalProcedure(query) {
            let best = null;
            let bestScore = 0;

            state.procedury.forEach(procedure => {
                const score = scoreProcedure(query, procedure);
                if (score > bestScore) {
                    best = procedure;
                    bestScore = score;
                }
            });

            return bestScore >= 24 ? best : null;
        }

        async function callAI(query, model) {
            const context = state.procedury
                .map(item => `ID: ${item.id}, Opis: ${item.prefix}, Slowa: ${(item.keywords || []).join(", ")}`)
                .join("\n");

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Dopasuj zgloszenie "${query}" do jednej procedury z listy.\n${context}\nOdpowiedz wylacznie identyfikatorem ID.`
                        }]
                    }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data?.error?.message || "Blad AI");
            return data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
        }

        async function resolveProcedure(query) {
            const aliasQuery = normalizeText(query).replace(/\s+/g, "");
            const aliasId = state.aliasToProcedureId[aliasQuery];
            if (aliasId) {
                const aliasMatch = state.procedury.find(item => item.id === aliasId);
                if (aliasMatch) return { procedure: aliasMatch, source: "Haslo" };
            }

            const localMatch = findLocalProcedure(query);
            if (localMatch) return { procedure: localMatch, source: "Lokalna baza" };

            if (state.apiKey) {
                try {
                    const aiId = await callAI(query, state.apiModel);
                    const aiMatch = state.procedury.find(item => aiId.includes(item.id));
                    if (aiMatch) return { procedure: aiMatch, source: "AI" };
                } catch (error) {
                    log(`AI niedostepne: ${error.message || "Blad AI"}`, true);
                }
            }
            return { procedure: null, source: "Brak" };
        }

        async function handleCommand(rawQuery) {
            const query = (rawQuery || "").trim();
            if (!query) {
                log("Brak komendy do analizy.", true);
                return;
            }

            state.openedFromList = false;
            state.listViewShown = false;
            userInputDisplay.textContent = query;
            manualQuery.value = "";
            log(`Analiza: ${query}`);

            const { procedure, source } = await resolveProcedure(query);
            if (!procedure) {
                renderEmptyState("Brak danych");
                return;
            }
            renderProcedure(procedure, source, { fromList: false });
        }

        function buildRecognition() {
            if (state.recognition) return state.recognition;
            const Recognition = getRecognitionCtor();
            if (!Recognition) return null;

            const recognition = new Recognition();
            recognition.lang = "pl-PL";
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                state.isListening = true;
                state.hasSpeechResult = false;
                micBtn.classList.add("listening");
                updateMicPresentation("Nasluch...");
                log("Mow teraz...");

                clearListeningWatchdog();
                state.listenWatchdogId = setTimeout(() => {
                    if (!state.hasSpeechResult && state.isListening) {
                        try { recognition.abort(); } catch (error) {}
                        openKeyboardVoiceFallback("Brak wyniku z mikrofonu. Uzyj pola Szukaj.");
                    }
                }, IS_IOS ? 5000 : 8000);
            };

            recognition.onaudiostart = () => log("Mikrofon aktywny.");
            recognition.onspeechstart = () => log("Wykryto mowe.");
            recognition.onspeechend = () => { try { recognition.stop(); } catch (error) {} };

            recognition.onresult = event => {
                state.hasSpeechResult = true;
                clearListeningWatchdog();
                const transcript = (event.results?.[0]?.[0]?.transcript || "").trim().toLowerCase();
                userInputDisplay.textContent = transcript;
                resetListeningUi();
                handleCommand(transcript);
            };

            recognition.onerror = event => {
                clearListeningWatchdog();
                const code = event.error || "unknown";
                if (code === "not-allowed" || code === "service-not-allowed") {
                    log("Brak zgody na mikrofon.", true);
                    resetListeningUi();
                    return;
                }
                if (code === "audio-capture") {
                    openKeyboardVoiceFallback("Przegladarka nie przekazuje dzwieku z mikrofonu.");
                    return;
                }
                if (code === "no-speech") {
                    log("Nie wykryto mowy. Sprobuj ponownie.", true);
                    resetListeningUi();
                    return;
                }
                resetListeningUi();
            };

            recognition.onend = () => {
                clearListeningWatchdog();
                resetListeningUi();
            };

            state.recognition = recognition;
            return recognition;
        }

        async function startListening() {
            if (state.isListening || state.isBusy) return;

            if (!window.isSecureContext && location.protocol !== "file:") {

                return;
            }

            state.isBusy = true;
            try {
                recognition.start();

            }
        }

    async function loadProcedures() {
            log("Pobieranie najnowszych procedur z GitHuba...");
            const loaded = [];
            
            for (const file of PLIKI) {
                try {
                    // Czysty fetch omijający pamięć podręczną, bez blokujących nagłówków
                    const response = await fetch(`${file}?v=${Date.now()}`, { cache: "no-store" });
                    
                    if (!response.ok) {
                        log(`Nie znaleziono pliku: ${file}`, true);
                        continue;
                    }
                    
                    // KLUCZOWE: Wymuszenie UTF-8 na poziomie odczytu bajtów dla polskich znaków
                    const buffer = await response.arrayBuffer();
                    const text = new TextDecoder('utf-8').decode(buffer);
                    const json = JSON.parse(text);
                    
                    if (validateProcedure(json)) {
                        loaded.push(json);
                    }
                } catch (error) {
                    log(`Błąd pliku ${file}: Zły format JSON lub błąd sieci`, true);
                }
            }
            
            // Zapis do prawidłowej zmiennej z zaawansowanej wersji systemu
            state.procedury = dedupeProcedures(loaded);
            buildProcedureAliases();
            log(`Pobrano ${state.procedury.length} procedur do pamięci.`);
        }

            log("Aplikacja zainstalowana.");
        });

        bootstrapApp();
    </script>
</body>
