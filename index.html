<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR AI | Core V15 iOS Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .listening { animation: pulse 1s infinite; background-color: #ef4444 !important; }
        body { background-color: #020617; color: #f8fafc; font-family: system-ui, sans-serif; overflow: hidden; }
        .source-badge { display: inline-block; background: #064e3b; border: 1px solid #10b981; color: #34d399; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .hidden { display: none !important; }
        
        #debug-console {
            height: 34px;
            overflow-y: auto;
            font-size: 8px;
            line-height: 1.2;
            background: rgba(0,0,0,0.5);
            border-left: 2px solid #ef4444;
        }

        #procedure-scroll-area::-webkit-scrollbar { width: 4px; }
        #procedure-scroll-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col p-3 h-screen">

    <header class="flex-none border-b border-slate-800 pb-1 mb-2">
        <div class="flex justify-between items-baseline">
            <h1 class="text-lg font-black text-red-600 uppercase italic tracking-tighter">KDR AI SYSTEM</h1>
            <span class="text-[8px] text-slate-500 uppercase">v15.0 iOS FIX</span>
        </div>
        <div id="debug-console" class="mt-1 p-1 font-mono text-yellow-600">
            > System V15 (Zgodność Apple) gotowy.
        </div>
    </header>

    <main class="flex-1 flex flex-col min-h-0 relative">
        <p id="user-input-display" class="flex-none text-slate-400 text-xs italic mb-2 text-center uppercase font-bold tracking-tighter h-4"></p>
        
        <div id="procedure-scroll-area" class="flex-1 overflow-y-auto w-full">
            <div id="procedure-output" class="text-3xl md:text-5xl font-black leading-tight text-center px-1">
                </div>
        </div>
    </main>

    <footer class="fixed bottom-6 left-0 right-0 flex justify-center z-50 pointer-events-none">
        <div class="pointer-events-auto">
            <button id="mic-btn" disabled class="w-40 h-40 rounded-full border-4 border-slate-700 bg-slate-950/90 backdrop-blur-sm text-slate-400 font-black uppercase shadow-2xl transition-all">
                Rozkaz
            </button>
            <button id="reset-btn" class="hidden w-40 h-40 rounded-full border-4 border-yellow-500 bg-slate-950/90 backdrop-blur-sm text-yellow-500 font-black uppercase shadow-[0_0_50px_rgba(234,179,8,0.4)]">
                Gotowy
            </button>
        </div>
    </footer>

    <script>
        let API_KEY = "";
        let PROCEDURY = [];
        const PLIKI = ['procedury/wypadek-ev.json', 'procedury/pozar-ev.json', 'procedury/zatopienie-ev.json', 'procedury/dezaktywacja-ev.json', 'procedury/wypadek-masowy.json'];

        const log = (msg, isErr = false) => {
            const el = document.getElementById('debug-console');
            el.innerHTML += `<div class="${isErr ? 'text-red-500' : ''}">> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        async function init() {
            for (const f of PLIKI) {
                try {
                    const r = await fetch(`${f}?v=${Date.now()}`);
                    if (r.ok) PROCEDURY.push(await r.json());
                } catch (e) { log(`Błąd bazy`, true); }
            }
            if (PROCEDURY.length > 0) {
                API_KEY = prompt("Wklej API Key:")?.trim();
                const mic = document.getElementById('mic-btn');
                mic.disabled = false;
                mic.classList.replace('text-slate-400', 'text-white');
                log("Gotowość bojowa.");
            }
        }

        async function callAI(query, model) {
            const ctx = PROCEDURY.map(d => `ID: ${d.id}, Opis: ${d.prefix}`).join("\n");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Dopasuj: "${query}" do ID: ${ctx}. Tylko ID.` }] }] })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Err");
            return data.candidates[0].content.parts[0].text.trim();
        }

        async function handleCommand(query) {
            log("Analiza...");
            let found = null;

            if (API_KEY) {
                try {
                    const aiId = await callAI(query, "gemini-3-flash-preview");
                    found = PROCEDURY.find(d => aiId.includes(d.id));
                    if (found) { display(found, "AI (G3)"); return; }
                } catch (e) {
                    try {
                        const aiId = await callAI(query, "gemini-1.5-flash");
                        found = PROCEDURY.find(d => aiId.includes(d.id));
                        if (found) { display(found, "AI (G1.5)"); return; }
                    } catch (e2) { log("AI błąd."); }
                }
            }

            let best = null; let max = 0;
            const words = query.toLowerCase().split(/\s+/);
            PROCEDURY.forEach(doc => {
                let s = 0;
                doc.keywords.forEach(k => {
                    if (query.includes(k.toLowerCase())) s += 50;
                    words.forEach(w => { if (w.length > 3 && k.toLowerCase().includes(w)) s += 10; });
                });
                if (s > max) { max = s; best = doc; }
            });

            if (best && max > 5) display(best, "LOKALNA");
            else {
                document.getElementById('procedure-output').innerHTML = '<span class="text-red-600">BRAK DANYCH</span>';
                speak("Brak procedury.");
                toggle(false);
            }
        }

        function display(doc, type) {
            document.getElementById('procedure-output').innerHTML = `
                <div class="mb-2"><span class="source-badge">${type}</span></div>
                <div class="text-slate-500 text-[10px] italic mb-4">${doc.prefix}</div>
                <div class="text-left border-t border-slate-800 pt-4">
                    ${doc.content.replace(/(\d+\.)/g, '<br><span class="text-yellow-500 font-black">$1</span>').replace(/\n/g, '<br>')}
                </div>
                <div class="h-64 w-full text-transparent">END_OF_DOC</div> 
            `;
            speak(`${doc.prefix}. ${doc.content}`);
            toggle(false);
            document.getElementById('procedure-scroll-area').scrollTop = 0;
        }

        function toggle(s) {
            document.getElementById('mic-btn').classList.toggle('hidden', !s);
            document.getElementById('reset-btn').classList.toggle('hidden', s);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pl-PL'; u.rate = 1.1;
            window.speechSynthesis.speak(u);
        }

        // ZMIANA POD iOS: Inicjalizacja mikrofonu na kliknięcie
        window.addEventListener('load', () => {
            init();
            
            document.getElementById('mic-btn').onclick = () => { 
                const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!Recognition) {
                    log("Brak API mowy na tym urządzeniu/przeglądarce.", true);
                    return;
                }
                
                try {
                    const rec = new Recognition();
                    rec.lang = 'pl-PL';
                    rec.interimResults = false; // iOS preferuje false
                    rec.maxAlternatives = 1;

                    rec.onstart = () => {
                        document.getElementById('mic-btn').classList.add('listening');
                        log("Nasłuchuję...");
                    };

                    rec.onerror = (e) => {
                        document.getElementById('mic-btn').classList.remove('listening');
                        log(`BŁĄD MIKROFONU (iOS): ${e.error}`, true);
                    };

                    rec.onend = () => {
                        document.getElementById('mic-btn').classList.remove('listening');
                    };

                    rec.onresult = (e) => {
                        const t = e.results[0][0].transcript.toLowerCase();
                        document.getElementById('user-input-display').innerText = t;
                        handleCommand(t);
                    };

                    window.speechSynthesis.cancel(); // Przerywamy ewentualne mówienie, by zwolnić kartę audio
                    rec.start(); 
                } catch (err) {
                    log(`Crash mikrofonu: ${err.message}`, true);
                }
            };

            document.getElementById('reset-btn').onclick = () => { 
                window.speechSynthesis.cancel(); 
                document.getElementById('procedure-output').innerHTML = ''; 
                document.getElementById('user-input-display').innerText = '';
                toggle(true); 
            };
        });
    </script>
</body>
</html>
