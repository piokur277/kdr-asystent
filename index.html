    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        body { background-color: #020617; color: #f8fafc; font-family: system-ui, sans-serif; overflow: hidden; }
        .source-badge { display: inline-block; background: #064e3b; border: 1px solid #10b981; color: #34d399; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .hidden { display: none !important; }
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.92);
            --panel-strong: #0f172a;
            --text: #f8fafc;
            --muted: #94a3b8;
            --line: #1e293b;
            --accent: #dc2626;
            --accent-soft: rgba(220, 38, 38, 0.18);
            --warn: #eab308;
            --ok: #10b981;
            --ok-soft: rgba(16, 185, 129, 0.14);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.18), transparent 34%),
                linear-gradient(180deg, #020617 0%, #020617 45%, #08101e 100%);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            padding: 12px;
            overflow: hidden;
        }

        .app-shell {
            position: relative;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 24px);
            max-width: 920px;
            margin: 0 auto;
        }

        .header {
            flex: 0 0 auto;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
        }

        .header-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            font-style: italic;
            color: #ef4444;
        }

        .version {
            font-size: 0.62rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.12em;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar-btn,
        .search-btn {
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar-btn.api-on {
            border-color: #10b981;
            color: #6ee7b7;
            background: var(--ok-soft);
        }

        #debug-console {
            height: 34px;
            margin-top: 10px;
            height: 78px;
            overflow-y: auto;
            font-size: 8px;
            line-height: 1.2;
            background: rgba(0,0,0,0.5);
            border-left: 2px solid #ef4444;
            border-radius: 10px;
            padding: 8px 10px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 11px;
            line-height: 1.35;
            background: rgba(0, 0, 0, 0.36);
            border-left: 3px solid #ef4444;
            color: #facc15;
        }

        #procedure-scroll-area::-webkit-scrollbar { width: 4px; }
        #procedure-scroll-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .debug-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .debug-line.error {
            color: #f87171;
        }

        .main {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 12px;
        }

        .manual-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            flex: 0 0 auto;
        }

        .manual-input {
            width: 100%;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            outline: none;
        }

        .manual-input::placeholder {
            color: #64748b;
        }

        .search-btn {
            min-width: 104px;
        }

        .status-line {
            min-height: 18px;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .output-wrap {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 8px 4px 170px;
            border-top: 1px solid rgba(30, 41, 59, 0.6);
        }

        .output-wrap::-webkit-scrollbar {
            width: 6px;
        }

        .output-wrap::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 999px;
        }

        #procedure-output {
            text-align: center;
            font-weight: 900;
            line-height: 1.15;
            font-size: clamp(1.8rem, 5vw, 3.8rem);
        }

        .empty-state {
            margin-top: 48px;
            color: #475569;
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .source-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid var(--ok);
            background: var(--ok-soft);
            color: #6ee7b7;
        }

        .procedure-prefix {
            margin-bottom: 18px;
            color: #94a3b8;
            font-size: 12px;
            font-style: italic;
            font-weight: 600;
        }

        .procedure-card {
            text-align: left;
            border-top: 1px solid var(--line);
            padding-top: 18px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.42), rgba(15, 23, 42, 0.18));
            border-radius: 16px;
            padding: 18px;
        }

        .procedure-line {
            display: block;
            margin-bottom: 10px;
            font-size: clamp(1rem, 2vw, 1.32rem);
            line-height: 1.45;
            font-weight: 700;
        }

        .step-no {
            color: var(--warn);
        }

        .footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 24px;
            display: flex;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        .footer-inner {
            pointer-events: auto;
        }

        .mic-btn,
        .reset-btn {
            width: min(40vw, 156px);
            height: min(40vw, 156px);
            border-radius: 999px;
            border: 4px solid #334155;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(10px);
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .mic-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .mic-btn:not(:disabled):active,
        .reset-btn:active,
        .toolbar-btn:active,
        .search-btn:active {
            transform: scale(0.98);
        }

        .reset-btn {
            display: none;
            color: #facc15;
            border-color: #eab308;
            box-shadow: 0 0 54px rgba(234, 179, 8, 0.24);
        }

        .hidden {
            display: none !important;
        }

        .listening {
            animation: pulse 1s infinite;
            background: rgba(127, 29, 29, 0.92) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.35);
        }

        .helper {
            color: #64748b;
            text-align: center;
            font-size: 11px;
            line-height: 1.45;
            margin-top: auto;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.985); }
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .app-shell {
                height: calc(100vh - 20px);
            }

            .manual-panel {
                grid-template-columns: 1fr;
            }

            .search-btn,
            .toolbar-btn {
                width: 100%;
            }

            #debug-console {
                height: 88px;
            }
        }
    </style>
</head>

    <script>

        let retryAfterAbort = false;
        const PLIKI = [
            'procedury/wypadek-ev.json',

            'procedury/zatopienie-ev.json',
            'procedury/dezaktywacja-ev.json',
            'procedury/wypadek-masowy.json'
        ];

        const PLIKI = ['procedury/wypadek-ev.json', 'procedury/pozar-ev.json', 'procedury/zatopienie-ev.json', 'procedury/dezaktywacja-ev.json', 'procedury/wypadek-masowy.json'];
        const DOMYSLNE_PROCEDURY = [
            {
                id: 'WYP-EV-01',
                prefix: 'Wypadek pojazdu elektrycznego po kolizji drogowej',
                keywords: [

            },
            {
                id: 'POZ-EV-01',

                content: '1. Natychmiast wyznacz szeroką strefę bezpieczeństwa i usuń osoby postronne.\n2. Potwierdź, czy pożar dotyczy kabiny, komory silnika czy baterii trakcyjnej.\n3. Przy oznakach runaway: gęsty biały dym, trzaski, intensywny wzrost temperatury, gazowanie akumulatora.\n4. Chłodź dużą ilością wody, kierując prądy na obszar baterii i podwozie; celem jest obniżanie temperatury, nie krótkie tłumienie płomienia.\n5. Nie stosuj działań polegających na rozcinaniu lub przebijaniu obudowy baterii bez specjalistycznej procedury i sprzętu.\n6. Monitoruj temperaturę kamerą termowizyjną oraz możliwość ponownego zapłonu przez długi czas po ugaszeniu.\n7. Jeżeli pożaru nie można ustabilizować, przygotuj miejsce do długotrwałego chłodzenia i izolacji pojazdu.\n8. Po ugaszeniu przekaż informację o konieczności nadzoru transportowego i obserwacji pożarowej.'
            },
            {
                id: 'ZAT-EV-01',
                prefix: 'Pojazd elektryczny po zalaniu lub zatopieniu',
                keywords: [
                    'zatopienie ev',
                    'elektryk w wodzie',

                content: '1. Traktuj pojazd jako potencjalnie będący pod napięciem do czasu pełnego rozpoznania.\n2. Nie wchodź do wody bez zabezpieczenia i oceny ryzyka porażenia oraz warunków hydrologicznych.\n3. Ewakuację ludzi wykonuj priorytetowo, stosując techniki wodno-ratownicze właściwe dla miejsca zdarzenia.\n4. Po wydobyciu ustaw pojazd w strefie izolowanej i nie uruchamiaj żadnych układów elektrycznych.\n5. Wyłącz zapłon, odsuń klucz i rozważ dezaktywację niskiego napięcia tylko jeśli producent i warunki na to pozwalają.\n6. Obserwuj wzrost temperatury, dymienie i bulgotanie akumulatora; zagrożenie może pojawić się z opóźnieniem.\n7. Zorganizuj nadzór po akcji oraz poinformuj właściciela i holownik o ryzyku wtórnego pożaru.'
            },
            {
                id: 'DEZ-EV-01',
                prefix: 'Dezaktywacja awaryjna pojazdu elektrycznego lub hybrydowego',
                keywords: [

                    'autobus i elektryk',
                    'duzo poszkodowanych',
                    'karambol',
                    'masowe zdarzenie drogowe',
                    'wiele ofiar',

                ],
                content: '1. Ustal dowodzenie, sektory działań i kanały łączności już w pierwszej fazie akcji.\n2. Wykonaj segregację medyczną i oddziel działania ratownicze od rozpoznania technicznego pojazdów.\n3. Każdy pojazd elektryczny oznacz i przypisz do osobnego rozpoznania zagrożeń energetycznych.\n4. Wprowadź strefę dla pojazdów podejrzanych o uszkodzenie baterii trakcyjnej poza głównym obszarem medycznym.\n5. Priorytetem jest życie poszkodowanych, ale bez wchodzenia ratowników w strefę niekontrolowanego pożaru lub napięcia.\n6. Zorganizuj osobne miejsce dla dekontaminacji, chłodzenia pojazdów i czasowej izolacji uszkodzonych EV.\n7. Po opanowaniu fazy medycznej przejdź do stabilizacji, dezaktywacji i przygotowania pojazdów do holowania.'
            }
        ];

        const state = {
            apiKey: localStorage.getItem('kdr_ai_api_key') || '',
            procedury: [],
            recognition: null,
            micStream: null,
            isListening: false,
            isBusy: false,
            hasSpeechResult: false,
            retryAfterAbort: false
        };

        const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const IS_STANDALONE = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        const log = (msg, isErr = false) => {
            const el = document.getElementById('debug-console');
            el.innerHTML += `<div class="${isErr ? 'text-red-500' : ''}">&gt; ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };
        const debugConsole = document.getElementById('debug-console');
        const micBtn = document.getElementById('mic-btn');
        const resetBtn = document.getElementById('reset-btn');
        const apiBtn = document.getElementById('api-btn');
        const voiceHelpBtn = document.getElementById('voice-help-btn');
        const manualForm = document.getElementById('manual-form');
        const manualQuery = document.getElementById('manual-query');
        const userInputDisplay = document.getElementById('user-input-display');
        const procedureOutput = document.getElementById('procedure-output');
        const procedureScrollArea = document.getElementById('procedure-scroll-area');

        function getRecognitionCtor() {
            return window.SpeechRecognition || window.webkitSpeechRecognition;
        function log(message, isError = false) {
            const line = document.createElement('div');
            line.className = `debug-line${isError ? ' error' : ''}`;
            line.textContent = `> ${message}`;
            debugConsole.appendChild(line);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        function setMicEnabled(enabled) {
            const mic = document.getElementById('mic-btn');
            mic.disabled = !enabled;
            mic.classList.toggle('opacity-60', !enabled);
            mic.classList.toggle('cursor-not-allowed', !enabled);
            if (enabled) mic.classList.replace('text-slate-400', 'text-white');
            micBtn.disabled = !enabled;
        }

        function toggle(showMic) {
            micBtn.classList.toggle('hidden', !showMic);
            resetBtn.classList.toggle('hidden', showMic);
        }

        function updateApiButton() {
            const hasKey = Boolean(state.apiKey);
            apiBtn.textContent = hasKey ? 'API ON' : 'API OFF';
            apiBtn.classList.toggle('api-on', hasKey);
        }

        function normalizeText(value) {
            return (value || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\p{L}\p{N}\s-]/gu, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function escapeHtml(value) {
            return (value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function validateProcedure(item) {
            return Boolean(
                item &&
                typeof item.id === 'string' &&
                typeof item.prefix === 'string' &&
                Array.isArray(item.keywords) &&
                typeof item.content === 'string'
            );
        }

        function dedupeProcedures(items) {
            const map = new Map();
            items.filter(validateProcedure).forEach(item => map.set(item.id, item));
            return Array.from(map.values());
        }

        async function loadProcedures() {
            const loaded = [];

            for (const file of PLIKI) {
                try {
                    const response = await fetch(`${file}?v=${Date.now()}`, { cache: 'no-store' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const json = await response.json();
                    if (validateProcedure(json)) loaded.push(json);
                } catch (error) {
                    log(`Plik ${file} niedostępny, używam kopii wbudowanej.`);
                }
            }

            state.procedury = loaded.length
                ? dedupeProcedures([...loaded, ...DOMYSLNE_PROCEDURY])
                : [...DOMYSLNE_PROCEDURY];

            log(`Załadowano ${state.procedury.length} procedur.`);
        }

        function getRecognitionCtor() {
            return window.SpeechRecognition || window.webkitSpeechRecognition;
        }

        function releaseMicStream() {
            if (!micStream) return;
            micStream.getTracks().forEach(track => track.stop());
            micStream = null;
            if (!state.micStream) return;
            state.micStream.getTracks().forEach(track => track.stop());
            state.micStream = null;
            log('Sesja mikrofonu zamknięta.');
        }

        async function ensureMicrophoneAccess() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('Brak MediaDevices.getUserMedia');
                throw new Error('Urządzenie nie udostępnia getUserMedia');
            }

            if (micStream && micStream.active) return micStream;
            if (state.micStream && state.micStream.active) {
                return state.micStream;
            }

            log('Aktywacja mikrofonu...');
            micStream = await navigator.mediaDevices.getUserMedia({
            state.micStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                video: false
            });

            return micStream;
            return state.micStream;
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pl-PL';
            utterance.rate = 1.05;
            window.speechSynthesis.speak(utterance);
        }

        function renderEmptyState(message) {
            procedureOutput.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
        }

        function renderProcedure(doc, sourceLabel) {
            const lines = escapeHtml(doc.content)
                .split('\n')
                .filter(Boolean)
                .map(line => line.replace(/^(\d+\.)\s*/u, '<span class="step-no">$1</span> '))
                .map(line => `<span class="procedure-line">${line}</span>`)
                .join('');

            procedureOutput.innerHTML = `
                <div class="source-badge">${escapeHtml(sourceLabel)}</div>
                <div class="procedure-prefix">${escapeHtml(doc.prefix)}</div>
                <div class="procedure-card">${lines}</div>
            `;

            toggle(false);
            procedureScrollArea.scrollTop = 0;
            speak(`${doc.prefix}. ${doc.content}`);
        }

        function scoreProcedure(query, procedure) {
            const normalizedQuery = normalizeText(query);
            const tokens = normalizedQuery.split(' ').filter(token => token.length > 2);
            const prefix = normalizeText(procedure.prefix);
            let score = 0;

            if (normalizedQuery === normalizeText(procedure.id)) score += 300;
            if (prefix.includes(normalizedQuery) && normalizedQuery.length > 5) score += 120;

            procedure.keywords.forEach(keyword => {
                const normalizedKeyword = normalizeText(keyword);
                if (normalizedQuery.includes(normalizedKeyword)) score += 120;
                if (normalizedKeyword.includes(normalizedQuery) && normalizedQuery.length > 5) score += 60;
                tokens.forEach(token => {
                    if (normalizedKeyword.includes(token)) score += token.length > 4 ? 16 : 8;
                    if (prefix.includes(token)) score += token.length > 4 ? 9 : 4;
                });
            });

            return score;
        }

        function findLocalProcedure(query) {
            let best = null;
            let bestScore = 0;

            state.procedury.forEach(procedure => {
                const score = scoreProcedure(query, procedure);
                if (score > bestScore) {
                    best = procedure;
                    bestScore = score;
                }
            });

            return bestScore >= 24 ? best : null;
        }

        async function callAI(query, model) {
            const context = state.procedury
                .map(item => `ID: ${item.id}, Opis: ${item.prefix}, Słowa: ${item.keywords.join(', ')}`)
                .join('\n');

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Dopasuj zgłoszenie "${query}" do jednej procedury z listy.\n${context}\nOdpowiedz wyłącznie identyfikatorem ID.`
                        }]
                    }]
                })
            });

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data?.error?.message || 'Błąd AI');
            }

            return data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
        }

        async function resolveProcedure(query) {
            if (state.apiKey) {
                try {
                    const aiId = await callAI(query, 'gemini-1.5-flash');
                    const aiMatch = state.procedury.find(item => aiId.includes(item.id));
                    if (aiMatch) return { procedure: aiMatch, source: 'AI' };
                } catch (error) {
                    log(`AI niedostępne: ${error.message}`, true);
                }
            }

            const localMatch = findLocalProcedure(query);
            if (localMatch) return { procedure: localMatch, source: 'Lokalna baza' };
            return { procedure: null, source: 'Brak' };
        }

        async function handleCommand(rawQuery) {
            const query = (rawQuery || '').trim();
            if (!query) {
                log('Brak komendy do analizy.', true);
                return;
            }

            userInputDisplay.textContent = query;
            log(`Analiza: ${query}`);

            const { procedure, source } = await resolveProcedure(query);

            if (!procedure) {
                renderEmptyState('Brak danych');
                speak('Brak procedury.');
                toggle(false);
                return;
            }

            renderProcedure(procedure, source);
        }

        function buildRecognition() {
            if (recognition) return recognition;
            if (state.recognition) return state.recognition;

            const Recognition = getRecognitionCtor();
            if (!Recognition) return null;

            recognition = new Recognition();
            const recognition = new Recognition();
            recognition.lang = 'pl-PL';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                hasSpeechResult = false;
                lastRecognitionError = '';
                document.getElementById('mic-btn').classList.add('listening');
                state.isListening = true;
                state.hasSpeechResult = false;
                micBtn.classList.add('listening');
                setMicEnabled(false);
                log('Mów teraz...');
            };
            };

            recognition.onspeechend = () => {
                try { recognition.stop(); } catch (e) {}
                try { recognition.stop(); } catch (error) {}
            };

            recognition.onresult = (e) => {
                hasSpeechResult = true;
                const transcript = (e.results?.[0]?.[0]?.transcript || '').trim().toLowerCase();
                document.getElementById('user-input-display').innerText = transcript;
            recognition.onresult = event => {
                state.hasSpeechResult = true;
                const transcript = (event.results?.[0]?.[0]?.transcript || '').trim().toLowerCase();
                handleCommand(transcript);
            };

            recognition.onerror = (e) => {
                lastRecognitionError = e.error || 'unknown';
            recognition.onerror = event => {
                const code = event.error || 'unknown';

                if (lastRecognitionError === 'aborted') {
                if (code === 'aborted') {
                    log('Safari przerwał nasłuch.', true);
                    if (IS_IOS && !retryAfterAbort) {
                        retryAfterAbort = true;
                        log('Ponowienie nasłuchu...');
                    if (IS_IOS && !state.retryAfterAbort) {
                        state.retryAfterAbort = true;
                    }
                    return;
                }

                if (lastRecognitionError === 'not-allowed' || lastRecognitionError === 'service-not-allowed') {
                    log('Brak zgody na mikrofon. Sprawdź ustawienia witryny w Safari.', true);
                if (code === 'not-allowed' || code === 'service-not-allowed') {
                    log('Brak zgody na mikrofon. Nadaj uprawnienie dla tej witryny w Safari.', true);
                    return;
                }

                if (lastRecognitionError === 'audio-capture') {
                    log('iPhone nie przekazał dźwięku z mikrofonu.', true);
                if (code === 'audio-capture') {
                    log('Urządzenie nie przekazuje dźwięku z mikrofonu.', true);
                    return;
                }

                if (lastRecognitionError === 'no-speech') {
                if (code === 'no-speech') {
                    log('Nie wykryto mowy. Spróbuj ponownie.', true);
                    return;
                }

                log(`Błąd mowy: ${lastRecognitionError}`, true);
                log(`Błąd rozpoznawania: ${code}`, true);
            };

            recognition.onend = async () => {
                const resetHidden = document.getElementById('reset-btn').classList.contains('hidden');
                document.getElementById('mic-btn').classList.remove('listening');
                isListening = false;
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                state.isListening = false;

                if (retryAfterAbort && !hasSpeechResult) {
                    retryAfterAbort = false;
                    await startListening(true);
                if (state.retryAfterAbort && !state.hasSpeechResult) {
                    state.retryAfterAbort = false;
                    setTimeout(() => startListening(true), 180);
                    return;
                }

                retryAfterAbort = false;
                if (resetHidden) setMicEnabled(true);
                if (!IS_IOS) releaseMicStream();
                state.retryAfterAbort = false;
                if (micBtn.classList.contains('hidden') === false) {
                    setMicEnabled(true);
                }

                if (!IS_IOS) {
                    releaseMicStream();
                }
            };

            state.recognition = recognition;
            return recognition;
        }

        async function init() {
            for (const f of PLIKI) {
                try {
                    const r = await fetch(`${f}?v=${Date.now()}`);
                    if (r.ok) PROCEDURY.push(await r.json());
                } catch (e) {
                    log('Błąd bazy procedur.', true);
                }
        async function startListening(isRetry = false) {
            if (state.isListening || state.isBusy) return;

            const recognition = buildRecognition();
            if (!recognition) {
                log('To urządzenie nie wspiera Web Speech API.', true);
                return;
            }

            if (PROCEDURY.length > 0) {
                API_KEY = prompt('Wklej API Key:')?.trim() || '';
                setMicEnabled(true);
                log('Gotowość bojowa.');
                if (IS_IOS) log('Tryb iOS aktywny.');
                if (IS_STANDALONE) log('Tryb PWA aktywny.');
                if (!window.isSecureContext && location.protocol !== 'file:') {
                    log('Mikrofon wymaga HTTPS albo localhost.', true);
                }
            } else {
                log('Nie załadowano procedur.', true);
            if (!window.isSecureContext && location.protocol !== 'file:') {
                log('Mikrofon wymaga HTTPS lub localhost.', true);
                return;
            }
        }

        async function callAI(query, model) {
            const ctx = PROCEDURY.map(d => `ID: ${d.id}, Opis: ${d.prefix}`).join('\n');
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Dopasuj: "${query}" do ID: ${ctx}. Tylko ID.` }] }] })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || 'Err');
            return data.candidates[0].content.parts[0].text.trim();
        }
            state.isBusy = true;

        async function handleCommand(query) {
            log('Analiza...');
            let found = null;
            try {
                window.speechSynthesis?.cancel();

            if (API_KEY) {
                try {
                    const aiId = await callAI(query, 'gemini-3-flash-preview');
                    found = PROCEDURY.find(d => aiId.includes(d.id));
                    if (found) {
                        display(found, 'AI');
                        return;
                    }
                } catch (e) {
                    try {
                        const aiId = await callAI(query, 'gemini-1.5-flash');
                        found = PROCEDURY.find(d => aiId.includes(d.id));
                        if (found) {
                            display(found, 'AI (G1.5)');
                            return;
                        }
                    } catch (e2) {
                        log('AI błąd.');
                    }
                if (IS_IOS) {
                    await ensureMicrophoneAccess();
                    if (!isRetry) log('Sesja audio iPhone gotowa.');
                }

                recognition.start();
            } catch (error) {
                const message = error?.name === 'InvalidStateError'
                    ? 'Nasłuch już trwa.'
                    : `Start nieudany: ${error.message}`;
                log(message, true);
                setMicEnabled(true);
            } finally {
                state.isBusy = false;
            }
        }

            let best = null;
            let max = 0;
            const normalizedQuery = query.toLowerCase();
            const words = normalizedQuery.split(/\s+/);
        function configureApiKey() {
            const value = prompt('Wklej API Key Gemini. Pozostaw puste, aby wyłączyć AI.', state.apiKey || '');
            if (value === null) return;

            PROCEDURY.forEach(doc => {
                let score = 0;
                doc.keywords.forEach(keyword => {
                    const normalizedKeyword = keyword.toLowerCase();
                    if (normalizedQuery.includes(normalizedKeyword)) score += 50;
                    words.forEach(word => {
                        if (word.length > 3 && normalizedKeyword.includes(word)) score += 10;
                    });
                });
                if (score > max) {
                    max = score;
                    best = doc;
                }
            });

            if (best && max > 5) {
                display(best, 'LOKALNA');
            state.apiKey = value.trim();
            if (state.apiKey) {
                localStorage.setItem('kdr_ai_api_key', state.apiKey);
                log('Zapisano API Key.');
            } else {
                document.getElementById('procedure-output').innerHTML = '<span class="text-red-600">BRAK DANYCH</span>';
                speak('Brak procedury.');
                toggle(false);
                localStorage.removeItem('kdr_ai_api_key');
                log('AI wyłączone. Pozostaje lokalna baza.');
            }
            updateApiButton();
        }

        function display(doc, type) {
            document.getElementById('procedure-output').innerHTML = `
                <div class="mb-2"><span class="source-badge">${type}</span></div>
                <div class="text-slate-500 text-[10px] italic mb-4">${doc.prefix}</div>
                <div class="text-left border-t border-slate-800 pt-4">
                    ${doc.content.replace(/(\d+\.)/g, '<br><span class="text-yellow-500 font-black">$1</span>').replace(/\n/g, '<br>')}
                </div>
                <div class="h-64 w-full text-transparent">END</div>
            `;
            speak(`${doc.prefix}. ${doc.content}`);
            toggle(false);
            document.getElementById('procedure-scroll-area').scrollTop = 0;
        function showIosHelp() {
            const help = IS_IOS
                ? 'iOS: uruchom stronę w Safari lub jako PWA, nadaj witrynie pozwolenie na mikrofon, a pierwsze uruchomienie wykonaj przyciskiem Rozkaz. Jeśli po dłuższej przerwie Safari ponownie zapyta o mikrofon, jest to ograniczenie WebKit.'
                : 'Na urządzeniach innych niż iOS mikrofon zwykle działa po jednorazowym pozwoleniu dla tej witryny.';
            alert(help);
        }

        function toggle(showMic) {
            document.getElementById('mic-btn').classList.toggle('hidden', !showMic);
            document.getElementById('reset-btn').classList.toggle('hidden', showMic);
        }
        function bindMicButton() {
            let lastTouchTime = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pl-PL';
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }
            const trigger = event => {
                if (event.type === 'touchend') {
                    lastTouchTime = Date.now();
                    event.preventDefault();
                    startListening();
                    return;
                }

        async function startListening(isRetry = false) {
            if (isListening) return;
                if (Date.now() - lastTouchTime < 500) {
                    return;
                }

            const rec = buildRecognition();
            if (!rec) {
                log('Brak API mowy na tym urządzeniu.', true);
                return;
            }
                startListening();
            };

            if (!window.isSecureContext && location.protocol !== 'file:') {
                log('Uruchom aplikację przez HTTPS albo localhost.', true);
                return;
            }
            micBtn.addEventListener('touchend', trigger, { passive: false });
            micBtn.addEventListener('click', trigger);
        }

            try {
                setMicEnabled(false);
                window.speechSynthesis.cancel();
        async function init() {
            await loadProcedures();
            updateApiButton();
            renderEmptyState('Oczekiwanie na rozkaz');

                if (IS_IOS) {
                    await ensureMicrophoneAccess();
                    if (!isRetry) log('Sesja audio iPhone gotowa.');
                }
            const recognitionSupported = Boolean(getRecognitionCtor());
            if (!recognitionSupported) {
                log('Brak SpeechRecognition. Użyj pola tekstowego.', true);
            }

                rec.start();
            } catch (err) {
                setMicEnabled(true);
                const message = err?.name === 'InvalidStateError'
                    ? 'Nasłuch już działa.'
                    : `Start nieudany: ${err.message}`;
                log(message, true);
            setMicEnabled(recognitionSupported);
            log('Gotowość bojowa.');

            if (IS_IOS) log('Tryb iOS aktywny.');
            if (IS_STANDALONE) log('Tryb PWA aktywny.');
            if (!window.isSecureContext && location.protocol !== 'file:') {
                log('Uwaga: mikrofon wymaga HTTPS lub localhost.', true);
            }
        }

        window.addEventListener('load', () => {
            init();

            document.getElementById('mic-btn').addEventListener('click', () => {
                startListening();
            });
        manualForm.addEventListener('submit', event => {
            event.preventDefault();
            handleCommand(manualQuery.value);
        });

            document.getElementById('reset-btn').addEventListener('click', () => {
                window.speechSynthesis.cancel();
                document.getElementById('procedure-output').innerHTML = '';
                document.getElementById('user-input-display').innerText = '';
                toggle(true);
                setMicEnabled(true);
            });
        resetBtn.addEventListener('click', () => {
            window.speechSynthesis?.cancel();
            procedureOutput.innerHTML = '<div class="empty-state">Oczekiwanie na rozkaz</div>';
            userInputDisplay.textContent = '';
            toggle(true);
            setMicEnabled(Boolean(getRecognitionCtor()));
            manualQuery.focus();
        });

        apiBtn.addEventListener('click', configureApiKey);
        voiceHelpBtn.addEventListener('click', showIosHelp);

        window.addEventListener('pagehide', () => {
            window.speechSynthesis.cancel();
            if (recognition && isListening) {
                try { recognition.abort(); } catch (e) {}
            window.speechSynthesis?.cancel();
            if (state.recognition && state.isListening) {
                try { state.recognition.abort(); } catch (error) {}
            }
            releaseMicStream();
        });

        bindMicButton();
        init();
    </script>
