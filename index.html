<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR AI | System Procedur EV</title>
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #f8fafc;
            --muted: #94a3b8;
            --line: #1e293b;
            --warn: #eab308;
            --ok: #10b981;
            --ok-soft: rgba(16, 185, 129, 0.14);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.18), transparent 34%),
                linear-gradient(180deg, #020617 0%, #020617 45%, #08101e 100%);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            padding: 12px;
            overflow: hidden;
        }

        .app-shell {
            position: relative;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 24px);
            max-width: 920px;
            margin: 0 auto;
        }

        .header {
            flex: 0 0 auto;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
        }

        .header-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            font-style: italic;
            color: #ef4444;
        }

        .version {
            font-size: 0.62rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.12em;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-panel {
            display: grid;
            grid-template-columns: 1.4fr 1fr auto auto;
            gap: 8px;
            margin-top: 10px;
        }

        .api-input,
        .manual-input {
            width: 100%;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
        }

        .manual-input {
            font-size: 15px;
        }

        .api-input::placeholder,
        .manual-input::placeholder {
            color: #64748b;
        }

        .toolbar-btn,
        .search-btn {
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar-btn.api-on {
            border-color: #10b981;
            color: #6ee7b7;
            background: var(--ok-soft);
        }

        .toolbar-btn.api-clear {
            color: #fca5a5;
            border-color: #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
        }

        #debug-console {
            margin-top: 10px;
            height: 78px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 8px 10px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 11px;
            line-height: 1.35;
            background: rgba(0, 0, 0, 0.36);
            border-left: 3px solid #ef4444;
            color: #facc15;
        }

        .debug-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .debug-line.error {
            color: #f87171;
        }

        .main {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 12px;
        }

        .manual-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            flex: 0 0 auto;
        }

        .search-btn {
            min-width: 104px;
        }

        .status-line {
            min-height: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .output-wrap {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 8px 4px 170px;
            border-top: 1px solid rgba(30, 41, 59, 0.6);
        }

        .output-wrap::-webkit-scrollbar {
            width: 6px;
        }

        .output-wrap::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 999px;
        }

        #procedure-output {
            text-align: center;
            font-weight: 900;
            line-height: 1.15;
            font-size: clamp(1.8rem, 5vw, 3.8rem);
        }

        .empty-state {
            margin-top: 48px;
            color: #475569;
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .source-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid var(--ok);
            background: var(--ok-soft);
            color: #6ee7b7;
        }

        .procedure-prefix {
            margin-bottom: 18px;
            color: var(--muted);
            font-size: 12px;
            font-style: italic;
            font-weight: 600;
        }

        .procedure-card {
            text-align: left;
            border-top: 1px solid var(--line);
            padding-top: 18px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.42), rgba(15, 23, 42, 0.18));
            border-radius: 16px;
            padding: 18px;
        }

        .procedure-line {
            display: block;
            margin-bottom: 10px;
            font-size: clamp(1rem, 2vw, 1.32rem);
            line-height: 1.45;
            font-weight: 700;
        }

        .step-no {
            color: var(--warn);
        }

        .footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 24px;
            display: flex;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        .footer-inner {
            pointer-events: auto;
        }

        .mic-btn,
        .reset-btn {
            width: min(40vw, 156px);
            height: min(40vw, 156px);
            border-radius: 999px;
            border: 4px solid #334155;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(10px);
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .mic-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .mic-btn:not(:disabled):active,
        .reset-btn:active,
        .toolbar-btn:active,
        .search-btn:active {
            transform: scale(0.98);
        }

        .reset-btn {
            display: none;
            color: #facc15;
            border-color: #eab308;
            box-shadow: 0 0 54px rgba(234, 179, 8, 0.24);
        }

        .hidden {
            display: none !important;
        }

        .listening {
            animation: pulse 1s infinite;
            background: rgba(127, 29, 29, 0.92) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.35);
        }

        .helper {
            color: #64748b;
            text-align: center;
            font-size: 11px;
            line-height: 1.45;
            margin-top: auto;
        }

        body.ios {
            padding: 8px;
        }

        body.ios .app-shell {
            height: calc(100vh - 16px);
        }

        body.ios .header {
            padding-bottom: 6px;
        }

        body.ios .title {
            font-size: 1.05rem;
        }

        body.ios .version {
            font-size: 0.54rem;
            letter-spacing: 0.08em;
        }

        body.ios .toolbar {
            gap: 6px;
            margin-top: 8px;
        }

        body.ios .toolbar-btn,
        body.ios .search-btn,
        body.ios .api-input,
        body.ios .manual-input {
            padding: 9px 11px;
            font-size: 13px;
        }

        body.ios #debug-console {
            margin-top: 8px;
            height: 50px;
            padding: 6px 8px;
            font-size: 10px;
        }

        body.ios .main {
            gap: 8px;
            padding-top: 8px;
        }

        body.ios .status-line {
            min-height: 14px;
            font-size: 10px;
        }

        body.ios .output-wrap {
            padding: 6px 2px 132px;
        }

        body.ios .footer {
            bottom: 12px;
        }

        body.ios .mic-btn,
        body.ios .reset-btn {
            width: min(28vw, 112px);
            height: min(28vw, 112px);
            font-size: 0.86rem;
        }

        body.ios.result-mode .output-wrap {
            padding-bottom: 76px;
        }

        body.ios.result-mode .footer {
            justify-content: flex-end;
            padding-right: 12px;
        }

        body.ios.result-mode .reset-btn {
            width: auto;
            min-width: 108px;
            height: 42px;
            padding: 0 16px;
            border-width: 2px;
            border-radius: 999px;
            font-size: 0.82rem;
            box-shadow: 0 0 26px rgba(234, 179, 8, 0.2);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.985); }
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .app-shell {
                height: calc(100vh - 20px);
            }

            .manual-panel,
            .api-panel {
                grid-template-columns: 1fr;
            }

            .search-btn,
            .toolbar-btn {
                width: 100%;
            }

            #debug-console {
                height: 88px;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="header">
            <div class="header-row">
                <h1 class="title">KDR AI SYSTEM</h1>
                <span class="version">v17.0 iOS READY</span>
            </div>

            <div class="toolbar">
                <button id="api-btn" class="toolbar-btn" type="button">Pokaz API</button>
                <button id="voice-help-btn" class="toolbar-btn" type="button">Pomoc iOS</button>
            </div>

            <div id="api-panel" class="api-panel hidden">
                <input
                    id="api-key-input"
                    class="api-input"
                    type="text"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    placeholder="Wklej API Key Gemini"
                >
                <input
                    id="api-model-input"
                    class="api-input"
                    type="text"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    placeholder="Model API, np. gemini-3-flash-preview"
                >
                <button id="api-save-btn" class="toolbar-btn api-on" type="button">Zapisz API</button>
                <button id="api-clear-btn" class="toolbar-btn api-clear" type="button">Usun API</button>
            </div>

            <div id="debug-console" aria-live="polite">
                <div class="debug-line">&gt; System startuje.</div>
            </div>
        </header>

        <main class="main">
            <form id="manual-form" class="manual-panel">
                <input
                    id="manual-query"
                    class="manual-input"
                    type="text"
                    autocomplete="off"
                    placeholder="Wpisz komende, np. pozar baterii po kolizji"
                >
                <button class="search-btn" type="submit">Szukaj</button>
            </form>

            <p id="user-input-display" class="status-line"></p>

            <div id="procedure-scroll-area" class="output-wrap">
                <div id="procedure-output">
                    <div class="empty-state">Oczekiwanie na rozkaz</div>
                </div>
            </div>

            <div class="helper">
                Lokalna baza procedur dziala bez API. Mikrofon na iOS wymaga Safari lub PWA z uprawnieniem do mikrofonu.
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <button id="mic-btn" class="mic-btn" disabled type="button">Rozkaz</button>
            <button id="reset-btn" class="reset-btn hidden" type="button">Gotowy</button>
        </div>
    </footer>

    <script>
        const PLIKI = [
            "procedury/wypadek-ev.json",
            "procedury/pozar-ev.json",
            "procedury/zatopienie-ev.json",
            "procedury/dezaktywacja-ev.json",
            "procedury/wypadek-masowy.json"
        ];

        const DOMYSLNE_PROCEDURY = [
            {
                id: "WYP-EV-01",
                prefix: "Wypadek pojazdu elektrycznego po kolizji drogowej",
                keywords: [
                    "wypadek ev",
                    "kolizja ev",
                    "samochod elektryczny po wypadku",
                    "auto elektryczne po dachowaniu",
                    "zderzenie auta elektrycznego",
                    "rozbity elektryk",
                    "uszkodzony pojazd elektryczny"
                ],
                content: "1. Zabezpiecz miejsce zdarzenia, wyznacz strefe dzialan i zatrzymaj ruch.\n2. Rozpoznaj pojazd: marka, model, oznaczenia EV, miejsce akumulatora trakcyjnego.\n3. Sprawdz zagrozenia dodatkowe: dym, syk, wyciek, uszkodzone przewody pomaranczowe, deformacja podwozia.\n4. Unies maske lub uzyskaj dostep zgodnie z karta ratownicza tylko wtedy, gdy jest to bezpieczne.\n5. Unieruchom pojazd, wybierz pozycje PARK, zaciagnij hamulec, wylacz zaplon i odsun klucz minimum 5 metrow.\n6. Jesli producent przewiduje petle ratownicza lub punkt odlaczenia 12V, wykonaj dezaktywacje zgodnie z procedura modelu.\n7. Nie przecinaj przewodow wysokiego napiecia i nie naruszaj obudowy baterii.\n8. Ewakuuj poszkodowanych standardowo, stale obserwujac temperature i oznaki uszkodzenia baterii.\n9. Po zakonczeniu dzialan przekaz pojazd do strefy obserwacji z informacja o ryzyku wtornym zaplonu."
            },
            {
                id: "POZ-EV-01",
                prefix: "Pozar lub termiczne uszkodzenie baterii trakcyjnej EV",
                keywords: [
                    "pozar ev",
                    "pozar baterii",
                    "plonie elektryk",
                    "dym z baterii",
                    "thermal runaway",
                    "zaplon baterii trakcyjnej",
                    "samochod elektryczny sie pali"
                ],
                content: "1. Natychmiast wyznacz szeroka strefe bezpieczenstwa i usun osoby postronne.\n2. Potwierdz, czy pozar dotyczy kabiny, komory silnika czy baterii trakcyjnej.\n3. Przy oznakach runaway: gesty bialy dym, trzaski, intensywny wzrost temperatury, gazowanie akumulatora.\n4. Chlodz duza iloscia wody, kierujac prady na obszar baterii i podwozie; celem jest obnizanie temperatury, nie krotkie tlumienie plomienia.\n5. Nie stosuj dzialan polegajacych na rozcinaniu lub przebijaniu obudowy baterii bez specjalistycznej procedury i sprzetu.\n6. Monitoruj temperature kamera termowizyjna oraz mozliwosc ponownego zaplonu przez dlugi czas po ugaszeniu.\n7. Jezeli pozaru nie mozna ustabilizowac, przygotuj miejsce do dlugotrwalego chlodzenia i izolacji pojazdu.\n8. Po ugaszeniu przekaz informacje o koniecznosci nadzoru transportowego i obserwacji pozarowej."
            },
            {
                id: "ZAT-EV-01",
                prefix: "Pojazd elektryczny po zalaniu lub zatopieniu",
                keywords: [
                    "zatopienie ev",
                    "elektryk w wodzie",
                    "zalany samochod elektryczny",
                    "pojazd ev w rzece",
                    "auto elektryczne w wodzie",
                    "podtopiony elektryk"
                ],
                content: "1. Traktuj pojazd jako potencjalnie bedacy pod napieciem do czasu pelnego rozpoznania.\n2. Nie wchodz do wody bez zabezpieczenia i oceny ryzyka porazenia oraz warunkow hydrologicznych.\n3. Ewakuacje ludzi wykonuj priorytetowo, stosujac techniki wodno-ratownicze wlasciwe dla miejsca zdarzenia.\n4. Po wydobyciu ustaw pojazd w strefie izolowanej i nie uruchamiaj zadnych ukladow elektrycznych.\n5. Wylacz zaplon, odsun klucz i rozwaz dezaktywacje niskiego napiecia tylko jesli producent i warunki na to pozwalaja.\n6. Obserwuj wzrost temperatury, dymienie i bulgotanie akumulatora; zagrozenie moze pojawic sie z opoznieniem.\n7. Zorganizuj nadzor po akcji oraz poinformuj wlasciciela i holownik o ryzyku wtornym pozaru."
            },
            {
                id: "DEZ-EV-01",
                prefix: "Dezaktywacja awaryjna pojazdu elektrycznego lub hybrydowego",
                keywords: [
                    "dezaktywacja ev",
                    "odlaczenie wysokiego napiecia",
                    "jak wylaczyc elektryka",
                    "petla ratownicza ev",
                    "rozlaczenie baterii trakcyjnej",
                    "odciecie 12v"
                ],
                content: "1. Podejdz do pojazdu tylko po rozpoznaniu stabilnosci i braku bezposredniego zagrozenia pozarowego.\n2. Ustaw przekladnie na PARK, zaciagnij hamulec postojowy i wylacz zaplon.\n3. Odsun klucz lub telefon-klucz co najmniej 5 metrow od pojazdu.\n4. Odlacz akumulator 12V lub aktywuj fabryczny punkt odlaczenia zgodnie z karta ratownicza danego modelu.\n5. W przypadku obecnosci petli ratowniczej lub wtyku serwisowego uzyj tylko wskazanego przez producenta sposobu dezaktywacji.\n6. Odczekaj czas wymagany przez producenta na rozladowanie kondensatorow ukladu HV.\n7. Po dezaktywacji nadal traktuj przewody pomaranczowe i baterie jako element niebezpieczny i nienaruszalny."
            },
            {
                id: "WYP-MAS-01",
                prefix: "Wypadek masowy z udzialem wielu poszkodowanych i mozliwym udzialem EV",
                keywords: [
                    "wypadek masowy",
                    "autobus i elektryk",
                    "duzo poszkodowanych",
                    "karambol",
                    "masowe zdarzenie drogowe",
                    "wiele ofiar",
                    "mci"
                ],
                content: "1. Ustal dowodzenie, sektory dzialan i kanaly lacznosci juz w pierwszej fazie akcji.\n2. Wykonaj segregacje medyczna i oddziel dzialania ratownicze od rozpoznania technicznego pojazdow.\n3. Kazdy pojazd elektryczny oznacz i przypisz do osobnego rozpoznania zagrozen energetycznych.\n4. Wprowadz strefe dla pojazdow podejrzanych o uszkodzenie baterii trakcyjnej poza glownym obszarem medycznym.\n5. Priorytetem jest zycie poszkodowanych, ale bez wchodzenia ratownikow w strefe niekontrolowanego pozaru lub napiecia.\n6. Zorganizuj osobne miejsce dla dekontaminacji, chlodzenia pojazdow i czasowej izolacji uszkodzonych EV.\n7. Po opanowaniu fazy medycznej przejdz do stabilizacji, dezaktywacji i przygotowania pojazdow do holowania."
            }
        ];

        const state = {
            apiKey: localStorage.getItem("kdr_ai_api_key") || "",
            apiModel: localStorage.getItem("kdr_ai_api_model") || "gemini-3-flash-preview",
            procedury: [],
            recognition: null,
            micStream: null,
            isListening: false,
             isBusy: false,
            hasSpeechResult: false,
            retryAfterAbort: false,
            listenWatchdogId: null
            listenWatchdogId: null,
            iosInputSubmitTimer: null
        };

        const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            state.listenWatchdogId = null;
        }

        function clearIosInputSubmitTimer() {
            if (!state.iosInputSubmitTimer) return;
            clearTimeout(state.iosInputSubmitTimer);
            state.iosInputSubmitTimer = null;
        }

        function resetListeningUi() {
            clearListeningWatchdog();
            state.isListening = false;
            setResultMode(false);
            toggle(true);
            resetListeningUi();
            clearIosInputSubmitTimer();
            manualQuery.value = "";
            userInputDisplay.textContent = "";
            manualQuery.removeAttribute("readonly");
                    }

                    openIosSearchFromButton();
                    return;
                }

                if (event.type === "touchend") {
                    lastTouchTime = Date.now();
                    event.preventDefault();
                    startListening();
                    return;
                }

                if (Date.now() - lastTouchTime < 500) {
                    return;
                }

                startListening();
            };

            micBtn.addEventListener("touchend", trigger, { passive: false });
            micBtn.addEventListener("click", trigger);
            if (IS_IOS) {
                micBtn.addEventListener("touchend", trigger, { passive: false });
            }
        }

        async function init() {

        manualForm.addEventListener("submit", event => {
            event.preventDefault();
            clearIosInputSubmitTimer();
            handleCommand(manualQuery.value);
        });

        manualQuery.addEventListener("input", () => {
            if (!IS_IOS) return;

            clearIosInputSubmitTimer();
            const value = manualQuery.value.trim();
            if (!value) return;

            state.iosInputSubmitTimer = setTimeout(() => {
                if (!manualQuery.value.trim()) return;
                handleCommand(manualQuery.value);
            }, 1200);
        });

        resetBtn.addEventListener("click", () => {
            procedureOutput.innerHTML = '<div class="empty-state">Oczekiwanie na rozkaz</div>';
            userInputDisplay.textContent = "";
            setResultMode(false);
            toggle(true);
            resetListeningUi();
            clearIosInputSubmitTimer();
            setMicEnabled(true);
            manualQuery.value = "";
            manualQuery.focus();

        window.addEventListener("pagehide", () => {
            clearListeningWatchdog();
            clearIosInputSubmitTimer();

    </script>
</body>
</html>
