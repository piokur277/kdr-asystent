<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR System | AI Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .listening { animation: pulse-ring 1.5s infinite; background-color: #ef4444 !important; }
        body { background-color: #030712; color: #f3f4f6; font-family: ui-sans-serif, system-ui; }
        .hidden-element { display: none !important; }
        .source-badge { display: inline-block; background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="border-b border-gray-800 pb-4 mb-4">
        <h1 class="text-2xl font-black text-red-600 uppercase italic leading-none">KDR System AI</h1>
        <div id="debug-console" class="mt-2 text-[10px] font-mono bg-black p-2 border border-gray-700 text-yellow-500 overflow-y-auto h-32">
            > System gotowy...
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center w-full max-w-4xl mx-auto text-center">
        <p id="user-input-display" class="text-lg text-gray-500 mb-6 italic min-h-[28px]">Inicjalizacja...</p>
        <div id="procedure-output" class="text-2xl md:text-4xl font-bold leading-tight"></div>
    </main>

    <footer class="fixed bottom-8 left-0 right-0 flex justify-center p-4">
        <button id="mic-btn" disabled class="w-40 h-40 rounded-full border-4 border-gray-700 bg-gray-900 text-gray-400 font-bold uppercase transition-all">
            Ładowanie...
        </button>
        <button id="reset-btn" class="hidden-element w-40 h-40 rounded-full border-4 border-yellow-500 bg-gray-900 text-yellow-500 font-bold uppercase shadow-[0_0_20px_rgba(234,179,8,0.3)]">
            Gotowy
        </button>
    </footer>

    <script>
        let GEMINI_API_KEY = "";
        let knowledgeBase = [];
        const files = [
            'procedury/wypadek-ev.json', 'procedury/pozar-ev.json', 'procedury/zatopienie-ev.json', 
            'procedury/dezaktywacja-ev.json', 'procedury/wypadek-masowy.json'
        ];

        const log = (msg, isError = false) => {
            const el = document.getElementById('debug-console');
            el.innerHTML += `<div class="${isError ? 'text-red-500' : ''}">> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        async function init() {
            log("Pobieranie bazy...");
            for (const f of files) {
                try {
                    const r = await fetch(`${f}?v=${Date.now()}`);
                    if (!r.ok) throw new Error(`Status ${r.status}`);
                    knowledgeBase.push(await r.json());
                    log(`Załadowano: ${f}`);
                } catch (e) { log(`Błąd bazy: ${f}`, true); }
            }

            if (knowledgeBase.length > 0) {
                GEMINI_API_KEY = prompt("Wklej klucz API (uważaj na spacje!):")?.trim();
                if (!GEMINI_API_KEY) log("Brak klucza API - tylko tryb lokalny.", true);
                
                document.getElementById('mic-btn').disabled = false;
                document.getElementById('mic-btn').innerText = "Rozkaz";
                document.getElementById('mic-btn').classList.replace('text-gray-400', 'text-white');
                document.getElementById('user-input-display').innerText = "Oczekuję na komendę...";
            }
        }

        async function handleCommand(query) {
            log(`Analiza: "${query}"`);
            
            if (GEMINI_API_KEY) {
                log("Łączenie z Gemini...");
                try {
                    const ctx = knowledgeBase.map(d => `ID: ${d.id}, Opis: ${d.prefix}`).join("\n");
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Jesteś asystentem KDR. Wybierz ID procedury dla: "${query}". Lista dostępnych ID:\n${ctx}\nOdpowiedz TYLKO samym ID (np. KARTA-Z1-Wypadek-EV). Jeśli nic nie pasuje, odpowiedz: BRAK.` }] }]
                        })
                    });

                    const data = await res.json();
                    
                    if (!res.ok) {
                        log(`Błąd serwera Google: ${data.error?.message || 'Nieznany'}`, true);
                        throw new Error("API_ERROR");
                    }

                    const aiText = data.candidates[0].content.parts[0].text.trim();
                    log(`AI odpisało: "${aiText}"`); // <--- TO JEST KLUCZOWE

                    const found = knowledgeBase.find(doc => aiText.includes(doc.id));
                    if (found) { display(found, "AI"); return; }
                    else { log("AI nie dopasowało ID do bazy."); }

                } catch (e) { 
                    log(`Przełączam na tryb lokalny. (Powód: ${e.message})`); 
                }
            }

            // Szukanie lokalne (zapasowe)
            let best = null; let max = 0;
            knowledgeBase.forEach(doc => {
                let score = 0;
                doc.keywords.forEach(k => { if (query.includes(k)) score += k.length; });
                if (score > max) { max = score; best = doc; }
            });

            if (best && max > 3) display(best, "LOKALNE");
            else {
                document.getElementById('procedure-output').innerHTML = '<span class="text-red-500 uppercase">Odmowa. Brak procedury.</span>';
                speak("Odmowa. Brak procedury.");
                toggle(false);
            }
        }

        function display(doc, type) {
            log(`Wyświetlam: ${doc.id} (${type})`);
            document.getElementById('procedure-output').innerHTML = `
                <div class="mb-4"><span class="source-badge px-2 py-1 text-[10px] font-bold rounded">${type}: ${doc.id}</span></div>
                <div class="text-gray-500 text-sm italic mb-4 leading-tight">${doc.prefix}</div>
                <div class="text-left max-w-2xl mx-auto">
                    ${doc.content.replace(/(\d+\.)/g, '<br><span class="text-yellow-500 font-black">$1</span>').replace(/\n/g, '<br>')}
                </div>
            `;
            speak(`${doc.prefix} ${doc.content}`);
            toggle(false);
        }

        function toggle(s) {
            document.getElementById('mic-btn').classList.toggle('hidden-element', !s);
            document.getElementById('reset-btn').classList.toggle('hidden-element', s);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pl-PL'; u.rate = 1.1;
            window.speechSynthesis.speak(u);
        }

        window.addEventListener('load', () => {
            init();
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return log("Brak obsługi mowy w przeglądarce!", true);
            const rec = new Speech();
            rec.lang = 'pl-PL';
            rec.onstart = () => document.getElementById('mic-btn').classList.add('listening');
            rec.onend = () => document.getElementById('mic-btn').classList.remove('listening');
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('user-input-display').innerText = `ROZKAZ: ${t.toUpperCase()}`;
                handleCommand(t);
            };
            document.getElementById('mic-btn').onclick = () => { 
                window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); 
                rec.start(); 
            };
            document.getElementById('reset-btn').onclick = () => { 
                window.speechSynthesis.cancel(); 
                document.getElementById('procedure-output').innerHTML = ''; 
                document.getElementById('user-input-display').innerText = 'Oczekuję na komendę...';
                toggle(true); 
            };
        });
    </script>
</body>
</html>
