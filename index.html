<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR AI | v21 SAFE</title>
    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #f3f4f6;
            color: #0f172a;
        }

        body { padding: 10px; }

        .app {
            max-width: 920px;
            margin: 0 auto;
            min-height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 900;
            color: #b91c1c;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .version {
            margin-top: 4px;
            font-size: 0.75rem;
            color: #475569;
            font-weight: 700;
        }

        .toolbar {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button, input {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
        }

        button {
            padding: 9px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            outline: none;
        }

        .search {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .status {
            min-height: 18px;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }
