<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR System | Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .listening { animation: pulse-ring 1.5s infinite; background-color: #ef4444 !important; }
        body { background-color: #030712; color: #f3f4f6; font-family: ui-sans-serif, system-ui; }
        .hidden-element { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="border-b border-gray-800 pb-4 mb-4">
        <h1 class="text-2xl font-black text-red-600 uppercase italic">KDR System AI</h1>
        <div id="debug-console" class="mt-2 text-[10px] font-mono bg-black p-2 border border-gray-700 text-yellow-500 overflow-y-auto max-h-32">
            Inicjalizacja konsoli...
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center w-full max-w-4xl mx-auto text-center">
        <p id="user-input-display" class="text-lg text-gray-500 mb-6 italic min-h-[28px]">Czekam na bazę danych...</p>
        <div id="procedure-output" class="text-2xl md:text-4xl font-bold leading-tight"></div>
    </main>

    <footer class="fixed bottom-8 left-0 right-0 flex justify-center p-4">
        <button id="mic-btn" disabled class="w-40 h-40 rounded-full border-4 border-gray-700 bg-gray-900 text-gray-500 font-bold uppercase opacity-50">
            Czekaj...
        </button>
        <button id="reset-btn" class="hidden-element w-40 h-40 rounded-full border-4 border-yellow-500 bg-gray-900 text-yellow-500 font-bold uppercase">
            Gotowy
        </button>
    </footer>

    <script>
        let GEMINI_API_KEY = "";
        let knowledgeBase = [];
        const files = [
            'procedury/wypadek-ev.json',
            'procedury/pozar-ev.json',
            'procedury/zatopienie-ev.json',
            'procedury/dezaktywacja-ev.json',
            'procedury/wypadek-masowy.json'
        ];

        const log = (msg, isError = false) => {
            const el = document.getElementById('debug-console');
            el.innerHTML += `<div class="${isError ? 'text-red-500' : ''}">> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        async function init() {
            log("Rozpoczynam pobieranie plików...");
            for (const f of files) {
                try {
                    const r = await fetch(`${f}?v=${Date.now()}`);
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const data = await r.json();
                    knowledgeBase.push(data);
                    log(`OK: ${f}`);
                } catch (e) {
                    log(`BŁĄD: ${f} (${e.message})`, true);
                }
            }

            if (knowledgeBase.length > 0) {
                log(`ŁĄCZNIE ZAŁADOWANO: ${knowledgeBase.length} PROCEDUR`);
                document.getElementById('mic-btn').disabled = false;
                document.getElementById('mic-btn').classList.remove('opacity-50');
                document.getElementById('mic-btn').classList.replace('text-gray-500', 'text-white');
                document.getElementById('mic-btn').innerText = "Rozkaz";
                document.getElementById('user-input-display').innerText = "System gotowy. Podaj rozkaz.";
                
                // Opcjonalnie: prośba o klucz AI
                if (confirm("Czy chcesz używać AI (Gemini)? Kliknij Anuluj, by używać tylko bazy lokalnej.")) {
                    GEMINI_API_KEY = prompt("Wklej klucz API:");
                }
            } else {
                log("KRYTYCZNY BŁĄD: Brak danych w bazie!", true);
                document.getElementById('user-input-display').innerText = "BŁĄD BAZY DANYCH.";
            }
        }

        async function handleCommand(query) {
            log(`Analiza komendy: "${query}"`);
            
            if (GEMINI_API_KEY) {
                log("Wysyłam do Gemini...");
                try {
                    const ctx = knowledgeBase.map(d => `ID: ${d.id}, Opis: ${d.prefix}`).join("\n");
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Wybierz tylko ID procedury dla: "${query}". Lista:\n${ctx}` }] }]
                        })
                    });
                    const d = await res.json();
                    const id = d.candidates[0].content.parts[0].text.trim();
                    const found = knowledgeBase.find(doc => id.includes(doc.id));
                    if (found) { display(found, "AI"); return; }
                } catch (e) { log("AI zawiodło, sprawdzam lokalnie..."); }
            }

            // Szukanie lokalne
            let best = null; let max = 0;
            knowledgeBase.forEach(doc => {
                let score = 0;
                doc.keywords.forEach(k => { if (query.includes(k)) score += k.length; });
                if (score > max) { max = score; best = doc; }
            });

            if (best && max > 3) display(best, "LOKALNE");
            else {
                document.getElementById('procedure-output').innerHTML = '<span class="text-red-500">BRAK DOPASOWANIA</span>';
                speak("Brak dopasowania.");
                toggle(false);
            }
        }

        function display(doc, type) {
            log(`Dopasowano: ${doc.id} (${type})`);
            document.getElementById('procedure-output').innerHTML = `
                <div class="text-green-500 text-xs mb-2 font-mono border border-green-500 inline-block px-2">${type}: ${doc.id}</div>
                <div class="text-gray-500 text-sm italic mb-4">${doc.prefix}</div>
                ${doc.content.replace(/(\d+\.)/g, '<br><span class="text-yellow-500">$1</span>').replace(/\n/g, '<br>')}
            `;
            speak(`${doc.prefix} ${doc.content}`);
            toggle(false);
        }

        function toggle(s) {
            document.getElementById('mic-btn').classList.toggle('hidden-element', !s);
            document.getElementById('reset-btn').classList.toggle('hidden-element', s);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'pl-PL';
            window.speechSynthesis.speak(u);
        }

        window.addEventListener('load', () => {
            init();
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return log("Błąd: Brak Speech API", true);
            const rec = new Speech();
            rec.lang = 'pl-PL';
            rec.onstart = () => document.getElementById('mic-btn').classList.add('listening');
            rec.onend = () => document.getElementById('mic-btn').classList.remove('listening');
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('user-input-display').innerText = `ROZKAZ: ${t.toUpperCase()}`;
                handleCommand(t);
            };
            document.getElementById('mic-btn').onclick = () => { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); rec.start(); };
            document.getElementById('reset-btn').onclick = () => { 
                window.speechSynthesis.cancel(); 
                document.getElementById('procedure-output').innerHTML = ''; 
                toggle(true); 
            };
        });
    </script>
</body>
</html>
