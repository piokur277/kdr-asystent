<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR AI | System Procedur</title>
    <style>
        :root {
            --bg: #020617;
            --bg2: #08101e;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #f8fafc;
            --muted: #94a3b8;
            --line: #1e293b;
            --warn: #eab308;
            --ok: #10b981;
            --ok-soft: rgba(16, 185, 129, 0.14);
            --accent: #ef4444;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(220, 38, 38, 0.16), transparent 34%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg) 45%, var(--bg2) 100%);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body { padding: 8px; }

        .app-shell {
            max-width: 920px;
            margin: 0 auto;
            min-height: calc(100vh - 16px);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header {
            border-bottom: 1px solid var(--line);
            padding-bottom: 6px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            font-style: italic;
            color: var(--accent);
        }

        .version {
            font-size: 0.54rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.08em;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .toolbar-btn,
        .search-btn {
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar-btn.api-on {
            border-color: var(--ok);
            color: #6ee7b7;
            background: var(--ok-soft);
        }

        .toolbar-btn.api-clear {
            color: #fca5a5;
            border-color: #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
        }

        .api-panel {
            display: grid;
            grid-template-columns: 1.4fr 1fr auto auto;
            gap: 8px;
            margin-top: 8px;
        }

        .api-input,
        .manual-input {
            width: 100%;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            outline: none;
        }

        .api-input::placeholder,
        .manual-input::placeholder {
            color: #64748b;
        }

        #debug-console {
            margin-top: 8px;
            height: 50px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 6px 8px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 10px;
            line-height: 1.35;
            background: rgba(0, 0, 0, 0.36);
            border-left: 3px solid var(--accent);
            color: #facc15;
        }

        .debug-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .debug-line.error { color: #f87171; }

        .main {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 auto;
            min-height: 0;
        }

        .manual-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .status-line {
            min-height: 14px;
            text-align: center;
            color: var(--muted);
            font-size: 10px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .output-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 6px 2px 18px;
            border-top: 1px solid rgba(30, 41, 59, 0.6);
        }

        #procedure-output {
            text-align: center;
            font-weight: 900;
            line-height: 1.15;
            font-size: clamp(1.4rem, 4.5vw, 3rem);
        }

        .empty-state {
            margin-top: 48px;
            color: #475569;
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .source-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid var(--ok);
            background: var(--ok-soft);
            color: #6ee7b7;
        }

        .procedure-prefix {
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 12px;
            font-style: italic;
            font-weight: 600;
        }

        .procedure-card {
            text-align: left;
            border-top: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.42), rgba(15, 23, 42, 0.18));
            border-radius: 16px;
            padding: 18px;
        }

        .procedure-line {
            display: block;
            margin-bottom: 10px;
            font-size: clamp(0.98rem, 2vw, 1.2rem);
            line-height: 1.45;
            font-weight: 700;
        }

        .step-no { color: var(--warn); }

        .footer {
            position: static;
            display: flex;
            justify-content: center;
            margin-top: 8px;
            padding: 6px 0 4px;
        }

        .footer-inner {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mic-btn,
        .reset-btn {
            width: min(28vw, 112px);
            height: min(28vw, 112px);
            border-radius: 999px;
            border: 4px solid #334155;
            background: rgba(2, 6, 23, 0.92);
            color: #e2e8f0;
            font-size: 0.86rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .reset-btn {
            display: none;
            color: #facc15;
            border-color: #eab308;
        }

        .mic-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .hidden { display: none !important; }

        .listening {
            animation: pulse 1s infinite;
            background: rgba(127, 29, 29, 0.92) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.35);
        }

        .helper {
            color: #64748b;
            text-align: center;
            font-size: 11px;
            line-height: 1.45;
        }

        body.result-mode .mic-btn,
        body.result-mode .reset-btn {
            width: auto;
            min-width: 108px;
            height: 42px;
            padding: 0 16px;
            border-width: 2px;
            border-radius: 999px;
            font-size: 0.82rem;
            box-shadow: 0 0 26px rgba(0, 0, 0, 0.18);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.985); }
        }

        @media (max-width: 640px) {
            .manual-panel,
            .api-panel { grid-template-columns: 1fr; }

            .search-btn,
            .toolbar-btn { width: 100%; }

            #debug-console { height: 64px; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="header">
            <div class="header-row">
                <h1 class="title">KDR AI SYSTEM</h1>
                <span class="version">v18.0 REBUILD</span>
            </div>

            <div class="toolbar">
                <button id="api-btn" class="toolbar-btn" type="button">Pokaz API</button>
                <button id="voice-help-btn" class="toolbar-btn" type="button">Pomoc iOS</button>
            </div>

            <div id="api-panel" class="api-panel hidden">
                <input id="api-key-input" class="api-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Wklej API Key Gemini">
                <input id="api-model-input" class="api-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Model API, np. gemini-3-flash-preview">
                <button id="api-save-btn" class="toolbar-btn api-on" type="button">Zapisz API</button>
                <button id="api-clear-btn" class="toolbar-btn api-clear" type="button">Usun API</button>
            </div>

            <div id="debug-console" aria-live="polite">
                <div class="debug-line">&gt; System startuje.</div>
            </div>
        </header>

        <main class="main">
            <form id="manual-form" class="manual-panel">
                <input id="manual-query" class="manual-input" type="text" autocomplete="off" placeholder="Wpisz komende, np. wyciek lng albo siarkowodor">
                <button class="search-btn" type="submit">Szukaj</button>
            </form>

            <p id="user-input-display" class="status-line"></p>

            <div id="procedure-scroll-area" class="output-wrap">
                <div id="procedure-output">
                    <div class="empty-state">Oczekiwanie na rozkaz</div>
                </div>
            </div>

            <div class="helper">
                Lokalna baza procedur dziala bez API. Na iOS przycisk Rozkaz otwiera pole tekstowe, aby uzyc mikrofonu klawiatury.
            </div>
        </main>

        <footer class="footer">
            <div class="footer-inner">
                <button id="mic-btn" class="mic-btn" disabled type="button">Rozkaz</button>
                <button id="reset-btn" class="reset-btn hidden" type="button">Gotowy</button>
            </div>
        </footer>
    </div>

    <script>
        const PLIKI = [
            "procedury/acetylen/karta-z1-butle-acetylen.json",
            "procedury/acetylen/karta-z2-butle-acetylen.json",
            "procedury/acetylen/karta-z3-butle-acetylen.json",
            "procedury/acetylen/karta-z4-butle-acetylen.json",
            "procedury/acetylen/przekazanie-miejsca-zdarzenia-butle-acetylen.json",
            "procedury/acetylen/rozpoznanie-buttle-acetylen.json",
            "procedury/chem/karta-z1-lng-pozar-zew.json",
            "procedury/chem/karta-z2-lng-pozar-strum.json",
            "procedury/chem/karta-z3-lng-pozar-rozlewiska.json",
            "procedury/chem/karta-z4-lng-wyciek.json",
            "procedury/chem/karta-z5-lng-zawory.json",
            "procedury/chem/zalacznik-b1-zagrozenie-biologiczne-gr3-gr4.json",
            "procedury/chem/zalacznik-b22-podejrzana-przesylka-cbr.json",
            "procedury/chem/zalacznik-r1-ochrona-radiologiczna.json",
            "procedury/chem/zalacznik-r2-zdarzenia-radiacyjne-zakres-podstawowy.json",
            "procedury/dezaktywacja-ev.json",
            "procedury/organizacja-dzialan/amoniaknh3.json",
            "procedury/organizacja-dzialan/chlorowodor.json",
            "procedury/organizacja-dzialan/co.json",
            "procedury/organizacja-dzialan/detektor-msa.json",
            "procedury/organizacja-dzialan/h2s.json",
            "procedury/organizacja-dzialan/hcn.json",
            "procedury/organizacja-dzialan/metodyka-organizacji-lacznosci-kdr.json",
            "procedury/organizacja-dzialan/zasady-organizowania-dzialan-ratowniczych.json",
            "procedury/pozar-ev.json",
            "procedury/wypadek-ev.json",
            "procedury/wypadek-masowy.json",
            "procedury/zatopienie-ev.json"
        ];

        const FALLBACK_URL = "procedury/baza.json";

        const state = {
            apiKey: localStorage.getItem("kdr_ai_api_key") || "",
            apiModel: localStorage.getItem("kdr_ai_api_model") || "gemini-3-flash-preview",
            procedury: [],
            recognition: null,
            isListening: false,
            isBusy: false,
            hasSpeechResult: false,
            listenWatchdogId: null,
            iosInputSubmitTimer: null
        };

        const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const IS_STANDALONE = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;

        const debugConsole = document.getElementById("debug-console");
        const micBtn = document.getElementById("mic-btn");
        const resetBtn = document.getElementById("reset-btn");
        const apiBtn = document.getElementById("api-btn");
        const apiPanel = document.getElementById("api-panel");
        const apiKeyInput = document.getElementById("api-key-input");
        const apiModelInput = document.getElementById("api-model-input");
        const apiSaveBtn = document.getElementById("api-save-btn");
        const apiClearBtn = document.getElementById("api-clear-btn");
        const voiceHelpBtn = document.getElementById("voice-help-btn");
        const manualForm = document.getElementById("manual-form");
        const manualQuery = document.getElementById("manual-query");
        const userInputDisplay = document.getElementById("user-input-display");
        const procedureOutput = document.getElementById("procedure-output");
        const procedureScrollArea = document.getElementById("procedure-scroll-area");

        function log(message, isError = false) {
            const line = document.createElement("div");
            line.className = `debug-line${isError ? " error" : ""}`;
            line.textContent = `> ${message}`;
            debugConsole.appendChild(line);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        function setMicEnabled(enabled) {
            micBtn.disabled = !enabled;
        }

        function updateMicPresentation(label = "Rozkaz") {
            micBtn.textContent = label;
        }

        function setResultMode(active) {
            document.body.classList.toggle("result-mode", active);
        }

        function updateApiButton() {
            const hasKey = Boolean(state.apiKey);
            apiBtn.textContent = hasKey ? "API ON" : "Pokaz API";
            apiBtn.classList.toggle("api-on", hasKey);
            apiKeyInput.value = state.apiKey;
            apiModelInput.value = state.apiModel;
        }

        function normalizeText(value) {
            return (value || "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^\p{L}\p{N}\s-]/gu, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function escapeHtml(value) {
            return (value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function validateProcedure(item) {
            return Boolean(
                item &&
                typeof item.id === "string" &&
                typeof item.prefix === "string" &&
                Array.isArray(item.keywords) &&
                typeof item.content === "string"
            );
        }

        function dedupeProcedures(items) {
            const map = new Map();
            items.filter(validateProcedure).forEach(item => map.set(item.id, item));
            return Array.from(map.values());
        }

        async function loadFallbackProcedures() {
            try {
                const response = await fetch(`${FALLBACK_URL}?v=${Date.now()}`, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                if (Array.isArray(json)) return json.filter(validateProcedure);
                return [];
            } catch (error) {
                log("Nie udalo sie wczytac procedury/baza.json.", true);
                return [];
            }
        }

        async function loadProcedures() {
            const loaded = [];
            for (const file of PLIKI) {
                try {
                    const response = await fetch(`${file}?v=${Date.now()}`, { cache: "no-store" });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const json = await response.json();
                    if (validateProcedure(json)) loaded.push(json);
                } catch (error) {
                    log(`Plik ${file} niedostepny lub zablokowany.`);
                }
            }

            const fallback = await loadFallbackProcedures();
            state.procedury = dedupeProcedures([...loaded, ...fallback]);
            log(`Zaladowano ${state.procedury.length} procedur.`);
        }

        function getRecognitionCtor() {
            return window.SpeechRecognition || window.webkitSpeechRecognition;
        }

        function clearListeningWatchdog() {
            if (!state.listenWatchdogId) return;
            clearTimeout(state.listenWatchdogId);
            state.listenWatchdogId = null;
        }

        function clearIosInputSubmitTimer() {
            if (!state.iosInputSubmitTimer) return;
            clearTimeout(state.iosInputSubmitTimer);
            state.iosInputSubmitTimer = null;
        }

        function resetListeningUi() {
            clearListeningWatchdog();
            state.isListening = false;
            state.isBusy = false;
            micBtn.classList.remove("listening");
            updateMicPresentation("Rozkaz");
            setMicEnabled(true);
        }

        function renderEmptyState(message) {
            setResultMode(false);
            procedureOutput.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
        }

        function renderProcedure(doc, sourceLabel) {
            const lines = escapeHtml(doc.content)
                .split("\n")
                .filter(Boolean)
                .map(line => line.replace(/^(\d+\.)\s*/u, '<span class="step-no">$1</span> '))
                .map(line => `<span class="procedure-line">${line}</span>`)
                .join("");

            procedureOutput.innerHTML = `
                <div class="source-badge">${escapeHtml(sourceLabel)}</div>
                <div class="procedure-prefix">${escapeHtml(doc.prefix)}</div>
                <div class="procedure-card">${lines}</div>
            `;

            setResultMode(true);
            procedureScrollArea.scrollTop = 0;
        }

        function scoreProcedure(query, procedure) {
            const normalizedQuery = normalizeText(query);
            const tokens = normalizedQuery.split(" ").filter(token => token.length > 2);
            const prefix = normalizeText(procedure.prefix);
            let score = 0;

            if (normalizedQuery === normalizeText(procedure.id)) score += 300;
            if (procedure.slowo_kluczowe && normalizedQuery.includes(normalizeText(procedure.slowo_kluczowe))) score += 180;
            if (prefix.includes(normalizedQuery) && normalizedQuery.length > 4) score += 120;

            procedure.keywords.forEach(keyword => {
                const normalizedKeyword = normalizeText(keyword);
                if (normalizedQuery.includes(normalizedKeyword)) score += 120;
                if (normalizedKeyword.includes(normalizedQuery) && normalizedQuery.length > 4) score += 60;
                tokens.forEach(token => {
                    if (normalizedKeyword.includes(token)) score += token.length > 4 ? 16 : 8;
                    if (prefix.includes(token)) score += token.length > 4 ? 9 : 4;
                });
            });

            return score;
        }

        function findLocalProcedure(query) {
            let best = null;
            let bestScore = 0;

            state.procedury.forEach(procedure => {
                const score = scoreProcedure(query, procedure);
                if (score > bestScore) {
                    best = procedure;
                    bestScore = score;
                }
            });

            return bestScore >= 24 ? best : null;
        }

        async function callAI(query, model) {
            const context = state.procedury
                .map(item => `ID: ${item.id}, Opis: ${item.prefix}, Slowa: ${(item.keywords || []).join(", ")}`)
                .join("\n");

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Dopasuj zgloszenie "${query}" do jednej procedury z listy.\n${context}\nOdpowiedz wylacznie identyfikatorem ID.`
                        }]
                    }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data?.error?.message || "Blad AI");
            return data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
        }

        async function resolveProcedure(query) {
            if (state.apiKey) {
                try {
                    const aiId = await callAI(query, state.apiModel);
                    const aiMatch = state.procedury.find(item => aiId.includes(item.id));
                    if (aiMatch) return { procedure: aiMatch, source: "AI" };
                } catch (error) {
                    log(`AI niedostepne: ${error.message || "Blad AI"}`, true);
                }
            }

            const localMatch = findLocalProcedure(query);
            if (localMatch) return { procedure: localMatch, source: "Lokalna baza" };
            return { procedure: null, source: "Brak" };
        }

        async function handleCommand(rawQuery) {
            const query = (rawQuery || "").trim();
            if (!query) {
                log("Brak komendy do analizy.", true);
                return;
            }

            userInputDisplay.textContent = query;
            manualQuery.value = "";
            log(`Analiza: ${query}`);

            const { procedure, source } = await resolveProcedure(query);
            if (!procedure) {
                renderEmptyState("Brak danych");
                return;
            }
            renderProcedure(procedure, source);
        }

        function openKeyboardVoiceFallback(reason = "") {
            resetListeningUi();
            manualQuery.focus();
            manualQuery.click();
            if (reason) log(reason, true);
            log("Uzyj mikrofonu z klawiatury telefonu w polu wpisywania.");
        }

        function openIosSearchFromButton() {
            resetListeningUi();
            clearIosInputSubmitTimer();
            manualQuery.value = "";
            userInputDisplay.textContent = "";
            manualQuery.focus();
            manualQuery.click();
            try { manualQuery.setSelectionRange(0, 0); } catch (error) {}
            manualQuery.scrollIntoView({ block: "center", behavior: "smooth" });
            log("iOS: pole Szukaj aktywne. Uzyj mikrofonu z klawiatury.");
        }

        function buildRecognition() {
            if (state.recognition) return state.recognition;
            const Recognition = getRecognitionCtor();
            if (!Recognition) return null;

            const recognition = new Recognition();
            recognition.lang = "pl-PL";
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                state.isListening = true;
                state.hasSpeechResult = false;
                micBtn.classList.add("listening");
                updateMicPresentation("Nasluch...");
                log("Mow teraz...");

                clearListeningWatchdog();
                state.listenWatchdogId = setTimeout(() => {
                    if (!state.hasSpeechResult && state.isListening) {
                        try { recognition.abort(); } catch (error) {}
                        openKeyboardVoiceFallback("Brak wyniku z mikrofonu. Uzyj pola Szukaj.");
                    }
                }, IS_IOS ? 5000 : 8000);
            };

            recognition.onaudiostart = () => log("Mikrofon aktywny.");
            recognition.onspeechstart = () => log("Wykryto mowe.");
            recognition.onspeechend = () => { try { recognition.stop(); } catch (error) {} };

            recognition.onresult = event => {
                state.hasSpeechResult = true;
                clearListeningWatchdog();
                const transcript = (event.results?.[0]?.[0]?.transcript || "").trim().toLowerCase();
                userInputDisplay.textContent = transcript;
                resetListeningUi();
                handleCommand(transcript);
            };

            recognition.onerror = event => {
                clearListeningWatchdog();
                const code = event.error || "unknown";
                if (code === "not-allowed" || code === "service-not-allowed") {
                    log("Brak zgody na mikrofon.", true);
                    resetListeningUi();
                    return;
                }
                if (code === "audio-capture") {
                    openKeyboardVoiceFallback("Przegladarka nie przekazuje dzwieku z mikrofonu.");
                    return;
                }
                if (code === "no-speech") {
                    log("Nie wykryto mowy. Sprobuj ponownie.", true);
                    resetListeningUi();
                    return;
                }
                resetListeningUi();
            };

            recognition.onend = () => {
                clearListeningWatchdog();
                resetListeningUi();
            };

            state.recognition = recognition;
            return recognition;
        }

        async function startListening() {
            if (state.isListening || state.isBusy) return;
            if (IS_IOS) {
                openIosSearchFromButton();
                return;
            }

            const recognition = buildRecognition();
            if (!recognition) {
                openKeyboardVoiceFallback("To urzadzenie nie wspiera rozpoznawania mowy w przegladarce.");
                return;
            }

            if (!window.isSecureContext && location.protocol !== "file:") {
                log("Mikrofon wymaga HTTPS lub localhost.", true);
                return;
            }

            state.isBusy = true;
            try {
                recognition.start();
            } catch (error) {
                openKeyboardVoiceFallback(`Start nieudany: ${error.message}`);
            }
        }

        function saveApiKey() {
            state.apiKey = apiKeyInput.value.trim();
            state.apiModel = apiModelInput.value.trim() || "gemini-3-flash-preview";
            if (state.apiKey) {
                localStorage.setItem("kdr_ai_api_key", state.apiKey);
                localStorage.setItem("kdr_ai_api_model", state.apiModel);
                log("Zapisano API Key.");
            } else {
                localStorage.removeItem("kdr_ai_api_key");
                localStorage.removeItem("kdr_ai_api_model");
                log("AI wylaczone. Pozostaje lokalna baza.");
            }
            updateApiButton();
        }

        function clearApiKey() {
            apiKeyInput.value = "";
            apiModelInput.value = "gemini-3-flash-preview";
            state.apiKey = "";
            state.apiModel = "gemini-3-flash-preview";
            localStorage.removeItem("kdr_ai_api_key");
            localStorage.removeItem("kdr_ai_api_model");
            updateApiButton();
            log("Usunieto API Key. Dziala tylko baza lokalna.");
        }

        function toggleApiPanel() {
            apiPanel.classList.toggle("hidden");
            if (!apiPanel.classList.contains("hidden")) {
                apiKeyInput.focus();
                apiKeyInput.select();
            }
        }

        function showIosHelp() {
            const help = IS_IOS
                ? "iOS: przycisk Rozkaz otwiera pole Szukaj, bo mikrofon klawiatury telefonu dziala stabilniej niz nasluch przegladarki."
                : "Na urzadzeniach innych niz iOS przycisk Rozkaz korzysta z mikrofonu przegladarki po pozwoleniu.";
            alert(help);
        }

        async function init() {
            await loadProcedures();
            updateApiButton();
            renderEmptyState("Oczekiwanie na rozkaz");
            setMicEnabled(true);
            log("Gotowosc bojowa.");
            if (IS_IOS) log("Tryb iOS aktywny.");
            if (IS_STANDALONE) log("Tryb PWA aktywny.");
            if (!window.isSecureContext && location.protocol !== "file:") {
                log("Uwaga: mikrofon wymaga HTTPS lub localhost.", true);
            }
        }

        manualForm.addEventListener("submit", event => {
            event.preventDefault();
            clearIosInputSubmitTimer();
            handleCommand(manualQuery.value);
        });

        manualQuery.addEventListener("input", () => {
            if (!IS_IOS) return;
            clearIosInputSubmitTimer();
            const value = manualQuery.value.trim();
            if (!value) return;
            state.iosInputSubmitTimer = setTimeout(() => {
                if (!manualQuery.value.trim()) return;
                handleCommand(manualQuery.value);
            }, 1200);
        });

        micBtn.addEventListener("click", startListening);
        apiBtn.addEventListener("click", toggleApiPanel);
        apiSaveBtn.addEventListener("click", saveApiKey);
        apiClearBtn.addEventListener("click", clearApiKey);
        voiceHelpBtn.addEventListener("click", showIosHelp);

        resetBtn.addEventListener("click", () => {
            procedureOutput.innerHTML = '<div class="empty-state">Oczekiwanie na rozkaz</div>';
            userInputDisplay.textContent = "";
            setResultMode(false);
            resetListeningUi();
            clearIosInputSubmitTimer();
            manualQuery.value = "";
            manualQuery.focus();
        });

        apiKeyInput.addEventListener("keydown", event => {
            if (event.key === "Enter") {
                event.preventDefault();
                saveApiKey();
            }
        });

        apiModelInput.addEventListener("keydown", event => {
            if (event.key === "Enter") {
                event.preventDefault();
                saveApiKey();
            }
        });

        window.addEventListener("pagehide", () => {
            clearListeningWatchdog();
            clearIosInputSubmitTimer();
            if (state.recognition && state.isListening) {
                try { state.recognition.abort(); } catch (error) {}
            }
        });

        init();
    </script>
</body>
</html>
