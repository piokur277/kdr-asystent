<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDR Voice Assist | Intuitive V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .listening {
            animation: pulse-ring 1.5s infinite;
            background-color: #ef4444 !important; 
            color: white !important;
            border-color: #ef4444 !important;
        }
        
        body { 
            overflow-y: auto; 
            background-color: #030712;
            -webkit-overflow-scrolling: touch;
        }

        .source-badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #4ade80;
        }

        .hidden-element { display: none !important; }

        .content-spacer { height: 260px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen flex flex-col p-4 md:p-8">

    <header class="sticky top-0 bg-gray-950/90 backdrop-blur-md z-50 flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-red-600 uppercase italic">KDR System</h1>
            <p class="text-[10px] text-gray-500 font-mono mt-1 uppercase tracking-widest">Procedury Ratownicze v3.0 (Intuitive)</p>
        </div>
        <div id="status-indicator" class="text-xs font-bold bg-gray-900 px-3 py-1 border border-gray-700 rounded uppercase text-gray-500">
            Inicjalizacja...
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center w-full max-w-4xl mx-auto">
        <p id="user-input-display" class="text-lg text-gray-500 mb-6 text-center italic font-mono min-h-[28px]">
            Ładowanie bazy danych...
        </p>
        
        <div id="source-indicator" class="hidden-element text-xs font-bold px-4 py-2 rounded mb-6 source-badge uppercase tracking-tighter"></div>

        <div id="procedure-output" class="text-2xl md:text-5xl font-black leading-tight text-center text-white break-words w-full px-2">
            </div>

        <div class="content-spacer"></div>
    </main>

    <footer class="fixed bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none">
        <div class="pointer-events-auto flex flex-col items-center">
            
            <button id="mic-btn" disabled class="w-44 h-44 md:w-52 md:h-52 rounded-full border-4 border-gray-700 text-gray-400 font-black text-xl uppercase flex flex-col justify-center items-center gap-2 bg-gray-900 shadow-[0_20px_50px_rgba(0,0,0,0.7)] transition-all active:scale-90 opacity-50 cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span>Rozkaz</span>
            </button>

            <button id="reset-btn" class="hidden-element w-44 h-44 md:w-52 md:h-52 rounded-full border-4 border-yellow-500 text-yellow-500 font-black text-xl uppercase flex flex-col justify-center items-center gap-2 bg-gray-900 shadow-[0_10px_40px_rgba(234,179,8,0.3)] transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                <span>Gotowy</span>
            </button>

        </div>
    </footer>

    <script>
        let knowledgeBaseDocuments = [];
        const filesToLoad = [
            'procedury/wypadek-ev.json',
            'procedury/pozar-ev.json',
            'procedury/zatopienie-ev.json',
            'procedury/dezaktywacja-ev.json',
            'procedury/wypadek-masowy.json'
        ];

        const micBtn = document.getElementById('mic-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusIndicator = document.getElementById('status-indicator');
        const userInputDisplay = document.getElementById('user-input-display');
        const procedureOutput = document.getElementById('procedure-output');
        const sourceIndicator = document.getElementById('source-indicator');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        async function loadProcedures() {
            statusIndicator.innerText = 'POBIERANIE...';
            for (const file of filesToLoad) {
                try {
                    const response = await fetch(`${file}?v=${new Date().getTime()}`);
                    if (response.ok) {
                        const data = await response.json();
                        knowledgeBaseDocuments.push(data);
                    }
                } catch (e) { console.error("Błąd pliku:", file); }
            }
            statusIndicator.innerText = 'GOTOWY';
            statusIndicator.classList.replace('text-gray-500', 'text-green-500');
            userInputDisplay.innerText = 'Oczekuję na komendę...';
            micBtn.disabled = false;
            micBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        window.addEventListener('load', () => {
            loadProcedures().then(() => {
                if (!SpeechRecognition) return;

                const recognition = new SpeechRecognition();
                recognition.lang = 'pl-PL';
                recognition.interimResults = false;

                recognition.onstart = () => {
                    micBtn.classList.add('listening');
                    statusIndicator.innerText = 'SŁUCHAM...';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript.toLowerCase().trim();
                    userInputDisplay.innerText = `Komenda: ${transcript.toUpperCase()}`;
                    searchAndDisplay(transcript);
                };

                recognition.onend = () => {
                    micBtn.classList.remove('listening');
                };

                // INTUICYJNY ALGORYTM WYSZUKIWANIA PUNKTOWEGO
                function searchAndDisplay(query) {
                    let bestMatch = null;
                    let maxScore = 0;

                    knowledgeBaseDocuments.forEach(doc => {
                        let currentScore = 0;
                        doc.keywords.forEach(keyword => {
                            if (query.includes(keyword)) {
                                // Premiujemy dłuższe frazy jako dokładniejsze
                                currentScore += (keyword.length * 2);
                            }
                        });
                        
                        if (currentScore > maxScore) {
                            maxScore = currentScore;
                            bestMatch = doc;
                        }
                    });

                    // Próg czułości (maxScore > 4, aby uniknąć przypadkowych trafień na pojedynczych literach)
                    if (bestMatch && maxScore > 4) {
                        displayProcedure(bestMatch);
                    } else {
                        procedureOutput.innerHTML = '<span class="text-red-600">ODMOWA. NIE ZROZUMIAŁEM LUB BRAK PROCEDURY.</span>';
                        speak("Odmowa. Nie zrozumiałem rozkazu.");
                        toggleUI(false);
                    }
                }

                function displayProcedure(doc) {
                    sourceIndicator.innerText = `ŹRÓDŁO: ${doc.id}`;
                    sourceIndicator.classList.remove('hidden-element');
                    
                    const formatted = doc.content
                        .replace(/(\d+\.)/g, '<br><span class="text-yellow-500 font-black">$1</span>')
                        .replace(/\n/g, '<br>');
                    
                    procedureOutput.innerHTML = `<span class="text-gray-500 text-lg block mb-4 italic">${doc.prefix}</span>${formatted}`;
                    speak(`${doc.prefix} ${doc.content}`);
                    toggleUI(false); 
                }

                function toggleUI(showMic) {
                    if (showMic) {
                        micBtn.classList.remove('hidden-element');
                        resetBtn.classList.add('hidden-element');
                        statusIndicator.innerText = 'GOTOWY';
                    } else {
                        micBtn.classList.add('hidden-element');
                        resetBtn.classList.remove('hidden-element');
                        statusIndicator.innerText = 'PROCEDURA AKTYWNA';
                    }
                }

                function speak(text) {
                    if (synth.speaking) synth.cancel();
                    const utt = new SpeechSynthesisUtterance(text);
                    utt.lang = 'pl-PL';
                    utt.rate = 1.1; 
                    synth.speak(utt);
                }

                micBtn.addEventListener('click', () => {
                    const unlock = new SpeechSynthesisUtterance('');
                    synth.speak(unlock);
                    recognition.start();
                });

                resetBtn.addEventListener('click', () => {
                    if (synth.speaking) synth.cancel();
                    procedureOutput.innerHTML = '';
                    sourceIndicator.classList.add('hidden-element');
                    userInputDisplay.innerText = 'Oczekuję na następny rozkaz...';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    toggleUI(true);
                });
            });
        });
    </script>
</body>
</html>
